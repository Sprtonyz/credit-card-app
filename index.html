<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Credit Card Consolidation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#0a0d12;color:#e8e6e1;font-family:'DM Mono',monospace;min-height:100vh;-webkit-tap-highlight-color:transparent;}

        /* Landing */
        .landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(99,102,241,0.06) 0%,transparent 60%),#0a0d12;}
        .landing-card{width:100%;max-width:360px;text-align:center;}
        .landing-eyebrow{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:#4b5563;margin-bottom:1.5rem;}
        .landing-title{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:300;color:#f1f0ec;line-height:1.15;margin-bottom:0.5rem;}
        .landing-sub{font-size:0.72rem;color:#4b5563;margin-bottom:3rem;letter-spacing:0.05em;}
        .who-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#6b7280;margin-bottom:1rem;}
        .user-btn{display:block;width:100%;padding:1rem 1.5rem;margin-bottom:0.75rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e8e6e1;font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;cursor:pointer;transition:all 0.2s;text-align:left;-webkit-tap-highlight-color:transparent;}
        .user-btn:hover{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3);transform:translateX(4px);}
        .user-initial{display:inline-block;width:32px;height:32px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.25);border-radius:50%;text-align:center;line-height:32px;font-size:0.9rem;margin-right:0.75rem;vertical-align:middle;font-family:'DM Mono',monospace;color:#60a5fa;}
        .landing-footer{margin-top:3rem;font-size:0.6rem;color:#374151;letter-spacing:0.1em;}

        /* Dev banner */
        .dev-banner{background:rgba(234,179,8,0.06);border-bottom:1px solid rgba(234,179,8,0.15);padding:0.35rem 0.75rem;display:flex;align-items:center;justify-content:center;gap:0.45rem;flex-wrap:wrap;}
        .dev-label{font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;color:#92400e;}
        .day-display{font-size:0.64rem;color:#fbbf24;min-width:56px;text-align:center;}
        .day-btn{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);border-radius:4px;color:#d97706;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
        .reset-btn{background:transparent;border:1px solid rgba(107,114,128,0.2);border-radius:4px;color:#6b7280;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}
        .clear-btn{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:4px;color:#f87171;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}
        .dev-sep{color:rgba(255,255,255,0.1);}

        /* Tally bar */
        .tally-bar{background:rgba(255,255,255,0.015);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:stretch;}
        .tally-main{display:flex;flex:1;}
        .tally-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:0.5rem;border-right:1px solid rgba(255,255,255,0.05);}
        .tally-name{font-size:0.5rem;letter-spacing:0.18em;text-transform:uppercase;color:#4b5563;margin-bottom:0.12rem;}
        .tally-amount{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:300;color:#93c5fd;}
        .tally-amount.dim{color:#4b5563;font-size:0.8rem;}
        .tally-amount.mac{color:#a78bfa;}
        .tally-note{font-size:0.42rem;color:#374151;margin-top:0.06rem;}
        .mac-toggle{display:flex;align-items:center;justify-content:center;padding:0 0.5rem;cursor:pointer;color:#374151;font-size:0.6rem;border-left:1px solid rgba(255,255,255,0.05);transition:color 0.15s;-webkit-tap-highlight-color:transparent;user-select:none;background:none;border-top:none;border-right:none;border-bottom:none;}
        .mac-toggle:hover{color:#6b7280;}
        .mac-panel{border-left:1px solid rgba(167,139,250,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.5rem 0.75rem;min-width:80px;background:rgba(167,139,250,0.03);animation:slideIn 0.2s ease;}
        @keyframes slideIn{from{opacity:0;transform:translateX(6px)}to{opacity:1;transform:translateX(0)}}

        /* Stats — two boxes only */
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin-bottom:1rem;}
        .stat-box{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:0.55rem 0.5rem;text-align:center;}
        .stat-val{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:300;color:#f1f0ec;line-height:1;}
        .stat-label{font-size:0.46rem;letter-spacing:0.12em;text-transform:uppercase;color:#4b5563;margin-top:0.2rem;}
        .stat-box.me{border-color:rgba(96,165,250,0.2);background:rgba(96,165,250,0.04);}

        /* App */
        .app{max-width:480px;margin:0 auto;padding:1rem 1rem 7rem;}
        .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;padding-bottom:0.8rem;border-bottom:1px solid rgba(255,255,255,0.06);}
        .app-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;color:#f1f0ec;}
        .header-right{display:flex;align-items:center;gap:0.45rem;}
        .user-badge{display:flex;align-items:center;gap:0.3rem;font-size:0.66rem;color:#60a5fa;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:20px;padding:0.26rem 0.65rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
        .undo-btn{font-size:0.64rem;color:#9ca3af;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:0.26rem 0.6rem;cursor:pointer;font-family:'DM Mono',monospace;-webkit-tap-highlight-color:transparent;user-select:none;}
        .undo-btn:disabled{opacity:0.22;cursor:default;}

        /* Day group */
        .day-group{margin-bottom:1.1rem;}
        .day-group-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.45rem;}
        .day-label-pill{font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;white-space:nowrap;}
        .day-label-pill.today{color:#60a5fa;}
        .day-label-pill.past{color:#f59e0b;}
        .attention-dot{width:5px;height:5px;border-radius:50%;background:#f59e0b;flex-shrink:0;}
        .day-line{flex:1;height:1px;background:rgba(255,255,255,0.05);}
        .day-line.past{background:rgba(245,158,11,0.2);}
        .day-date{font-size:0.48rem;white-space:nowrap;color:#2d3748;}
        .attention-tag{font-size:0.44rem;color:rgba(245,158,11,0.55);letter-spacing:0.08em;text-transform:uppercase;}

        /* Cards */
        .tx-card{border-radius:9px;padding:0.7rem;margin-bottom:0.38rem;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);overflow:hidden;transition:max-height 0.28s ease,opacity 0.22s ease,padding 0.28s,margin 0.28s,border-width 0.28s;max-height:260px;}
        .tx-card.conflict{border-color:rgba(239,68,68,0.38);background:rgba(239,68,68,0.035);}
        .tx-card.collapsing{max-height:0!important;padding-top:0!important;padding-bottom:0!important;margin-bottom:0!important;opacity:0;border-width:0!important;}
        .tx-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.45rem;}
        .tx-desc{font-size:0.75rem;color:#d1cfc9;}
        .tx-meta{display:flex;gap:0.28rem;align-items:center;margin-bottom:0.18rem;}
        .badge{font-size:0.5rem;padding:0.06rem 0.35rem;border-radius:3px;}
        .badge-conflict{background:rgba(239,68,68,0.16);color:#f87171;}
        .badge-unsure{background:rgba(245,158,11,0.13);color:#fbbf24;}
        .badge-auto{background:rgba(107,114,128,0.15);color:#9ca3af;}
        .tx-amount{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:300;color:#93c5fd;white-space:nowrap;padding-left:0.4rem;}

        /* Assign buttons — order: Unsure, Macquarie, Tony, Nugs */
        .assign-row{display:flex;gap:0.28rem;align-items:center;}
        .assign-label{font-size:0.46rem;color:#2d3748;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
        .tap-btn{flex:1;padding:0.4rem 0.2rem;border-radius:5px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:#6b7280;font-family:'DM Mono',monospace;font-size:0.62rem;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;touch-action:manipulation;outline:none;}
        .tap-btn.mac-btn{color:#7c6f9e;border-color:rgba(167,139,250,0.12);background:rgba(167,139,250,0.04);}
        .tap-btn.unsure-btn{color:#6b6047;border-color:rgba(245,158,11,0.1);background:rgba(245,158,11,0.03);}
        .tap-btn.flash{background:rgba(59,130,246,0.2)!important;border-color:rgba(59,130,246,0.4)!important;color:#93c5fd!important;}
        .tap-btn.tony-btn{color:#4ade80;border-color:rgba(74,222,128,0.15);background:rgba(74,222,128,0.05);}
        .tap-btn.nugs-btn{color:#f9a8d4;border-color:rgba(249,168,212,0.15);background:rgba(249,168,212,0.05);}
        .tap-btn.tony-btn.flash{background:rgba(74,222,128,0.18)!important;border-color:rgba(74,222,128,0.4)!important;color:#86efac!important;}
        .tap-btn.nugs-btn.flash{background:rgba(249,168,212,0.18)!important;border-color:rgba(249,168,212,0.4)!important;color:#fbcfe8!important;}
        .conflict-tap-btn.tony-btn{border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.06);color:#4ade80;}
        .conflict-tap-btn.nugs-btn{border-color:rgba(249,168,212,0.2);background:rgba(249,168,212,0.06);color:#f9a8d4;}
        .conflict-tap-btn.tony-btn.flash{background:rgba(74,222,128,0.2)!important;}
        .conflict-tap-btn.nugs-btn.flash{background:rgba(249,168,212,0.2)!important;}
        .tally-item.me .tally-amount{color:#e8e6e1;}
        .tap-btn.mac-btn.flash{background:rgba(167,139,250,0.2)!important;border-color:rgba(167,139,250,0.4)!important;color:#c4b5fd!important;}
        .tap-btn.unsure-btn.flash{background:rgba(245,158,11,0.15)!important;border-color:rgba(245,158,11,0.3)!important;color:#fbbf24!important;}

        /* Conflict re-assign */
        .conflict-note{font-size:0.52rem;color:#6b7280;margin-bottom:0.3rem;}
        .conflict-row{display:flex;gap:0.28rem;flex-wrap:wrap;}
        .conflict-tap-btn{flex:1;min-width:52px;padding:0.38rem 0.2rem;border-radius:5px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.06);color:#f87171;font-family:'DM Mono',monospace;font-size:0.62rem;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;outline:none;}
        .conflict-tap-btn.mac-btn{border-color:rgba(167,139,250,0.2);background:rgba(167,139,250,0.06);color:#c4b5fd;}
        .conflict-tap-btn.unsure-btn{border-color:rgba(245,158,11,0.15);background:rgba(245,158,11,0.05);color:#fbbf24;}
        .conflict-tap-btn.flash{opacity:0.6;}
        .my-pick-note{font-size:0.5rem;color:#6b7280;margin-bottom:0.28rem;}
        .my-pick-chip{display:inline-block;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:4px;padding:0.06rem 0.4rem;color:#60a5fa;font-size:0.52rem;}

        /* Switch overlay */
        .switch-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:2rem;}
        .switch-card{background:#0f1318;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:2rem;width:100%;max-width:320px;text-align:center;}
        .switch-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;margin-bottom:0.35rem;color:#f1f0ec;}
        .switch-sub{font-size:0.62rem;color:#4b5563;margin-bottom:1.5rem;}

        /* All done */
        .all-done{text-align:center;padding:3rem 1.5rem 4rem;}
        .all-done-inner{animation:fadeUp 0.6s ease forwards;}
        .all-done-emoji{font-size:3.2rem;display:block;margin-bottom:0.8rem;animation:pop 0.5s cubic-bezier(.36,.07,.19,.97) 0.15s both;}
        .all-done-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;color:#f1f0ec;margin-bottom:0.5rem;line-height:1.2;}
        .all-done-sub{font-size:0.72rem;color:#4b5563;margin-bottom:1.5rem;}
        .all-done-badge{display:inline-block;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:#60a5fa;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:20px;padding:0.3rem 0.8rem;animation:fadeUp 0.5s ease 0.5s both;}
        #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}

        /* Sync status bar */
        .sync-bar{display:flex;align-items:center;justify-content:space-between;padding:0.3rem 0.9rem;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.04);}
        .sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
        .sync-dot.connected{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.6);}
        .sync-dot.disconnected{background:#f87171;}
        .sync-dot.connecting{background:#fbbf24;animation:pulse 1s infinite;}
        .sync-status{display:flex;align-items:center;gap:0.4rem;font-size:0.52rem;color:#4b5563;letter-spacing:0.08em;}
        .sync-status.connected{color:#4ade80;}
        .sync-status.disconnected{color:#f87171;}
        .online-users{display:flex;align-items:center;gap:0.35rem;}
        .online-chip{font-size:0.5rem;padding:0.1rem 0.45rem;border-radius:10px;letter-spacing:0.05em;}
        .online-chip.active{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);}
        .online-chip.self{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2);}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.3)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
        /* Pet footer — pixel pet walks across */
        .pet-footer{position:fixed;bottom:0;left:0;right:0;height:54px;background:rgba(8,10,15,0.98);border-top:1px solid rgba(255,255,255,0.055);backdrop-filter:blur(16px);z-index:50;overflow:hidden;}
        .pet-footer canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

        /* Shop bar — horizontal, centered, pinned above pet footer */
        .shop-bar{position:fixed;bottom:54px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:0.45rem;padding:0.3rem 1rem;background:rgba(8,10,15,0.95);border-top:1px solid rgba(255,255,255,0.055);backdrop-filter:blur(12px);z-index:45;flex-wrap:wrap;}
        .shop-coins{font-size:0.6rem;color:#fbbf24;font-family:'DM Mono',monospace;white-space:nowrap;}
        .shop-food{font-size:0.58rem;color:#9ca3af;white-space:nowrap;}
        .shop-hp-wrap{display:flex;align-items:center;gap:0.3rem;}
        .shop-hp-label{font-size:0.46rem;letter-spacing:0.12em;text-transform:uppercase;color:#4b5563;white-space:nowrap;}
        .shop-hp-bar{width:58px;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;flex-shrink:0;}
        .shop-hp-fill{height:100%;border-radius:2px;transition:width 0.4s ease,background 0.4s ease;}
        .shop-hp-val{font-size:0.48rem;color:#4b5563;white-space:nowrap;}
        .shop-divider-v{width:1px;height:14px;background:rgba(255,255,255,0.07);flex-shrink:0;}
        .pet-level{font-size:0.56rem;color:#a78bfa;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);border-radius:10px;padding:0.1rem 0.38rem;white-space:nowrap;font-family:'DM Mono',monospace;}
        .shop-btn{font-size:0.52rem;padding:0.26rem 0.5rem;border-radius:5px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:#6b7280;font-family:'DM Mono',monospace;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center;transition:background 0.12s;user-select:none;touch-action:manipulation;white-space:nowrap;}
        .shop-btn:disabled{opacity:0.2;cursor:default;}
        .shop-btn.buy{border-color:rgba(251,191,36,0.22);color:#d97706;background:rgba(251,191,36,0.04);}
        .shop-btn.buy:not(:disabled):active{background:rgba(251,191,36,0.2);}
        .shop-btn.feed{border-color:rgba(74,222,128,0.22);color:#4ade80;background:rgba(74,222,128,0.04);}
        .shop-btn.feed:not(:disabled):active{background:rgba(74,222,128,0.2);}
        /* Pet debug row */
        .pet-debug-row{background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.04);padding:0.22rem 0.75rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
        @keyframes xpPop{0%{transform:scale(1)}40%{transform:scale(1.3);color:#c4b5fd}100%{transform:scale(1)}}
        /* Level-up VFX */
        .levelup-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:600;}
        .levelup-badge{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:600;color:#a78bfa;text-align:center;line-height:1.2;animation:levelUpPop 2.4s ease-out forwards;text-shadow:0 0 40px rgba(167,139,250,0.9),0 0 80px rgba(167,139,250,0.4);}
        .levelup-sub{font-size:0.72rem;color:#c4b5fd;letter-spacing:0.2em;text-transform:uppercase;animation:levelUpFade 2.4s ease-out forwards;margin-top:0.3rem;}
        @keyframes levelUpPop{0%{transform:scale(0.3) translateY(30px);opacity:0}20%{transform:scale(1.18) translateY(-4px);opacity:1}35%{transform:scale(0.96) translateY(0);opacity:1}65%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(0.85) translateY(-24px);opacity:0}}
        @keyframes levelUpFade{0%,15%{opacity:0}30%{opacity:1}65%{opacity:1}100%{opacity:0}}

        /* Pixel coin pop */
        .coin-pop{position:fixed;pointer-events:none;z-index:500;display:flex;align-items:center;gap:5px;transform:translateX(-50%);animation:coinFloat 0.85s ease-out forwards;}
        .coin-pop-text{font-size:0.68rem;color:#fef08a;font-family:'DM Mono',monospace;font-weight:500;text-shadow:0 0 8px rgba(254,240,138,0.85);}
        /* 5×5 pixel coin at 2px scale using box-shadow */
        .pixel-coin-art{display:inline-block;width:2px;height:2px;background:transparent;flex-shrink:0;position:relative;top:2px;
            box-shadow:
                2px 0 0 0 #fbbf24,4px 0 0 0 #d97706,6px 0 0 0 #fbbf24,
                0px 2px 0 0 #fbbf24,2px 2px 0 0 #fbbf24,4px 2px 0 0 #fef08a,6px 2px 0 0 #fbbf24,8px 2px 0 0 #fbbf24,
                0px 4px 0 0 #fbbf24,2px 4px 0 0 #d97706,4px 4px 0 0 #fffbeb,6px 4px 0 0 #d97706,8px 4px 0 0 #fbbf24,
                0px 6px 0 0 #fbbf24,2px 6px 0 0 #fbbf24,4px 6px 0 0 #fef08a,6px 6px 0 0 #fbbf24,8px 6px 0 0 #fbbf24,
                2px 8px 0 0 #fbbf24,4px 8px 0 0 #d97706,6px 8px 0 0 #fbbf24;}
        @keyframes coinFloat{0%{transform:translateX(-50%) translateY(0) scale(0.5);opacity:1}18%{transform:translateX(-50%) translateY(-10px) scale(1.2);opacity:1}100%{transform:translateX(-50%) translateY(-52px) scale(1);opacity:0}}
    </style>
</head>

/* ── TxCard ── */
function TxCard({tx,txKey,simDelta,currentUser,subs,onAssign,collapsing,nowMs}){
    const sub=subs[tx.id]||{};
    const past=conflictVisible(txKey,simDelta);
    const otherUser=getOtherUser(currentUser);
    const autoConf=isAutoConfirmed(sub,tx.id,nowMs);

    // For past-day cards, status uses the most recent re-pick (any past day), but
    // never today's live re-pick (to prevent same-day status changes on the other device).
    // Priority: today's snapshot (_re_prev) → any past _re → committed pick.
    const effectivePick=u=>{
        if(!past) return getSubValue(sub,u);
        const re=sub[u+'_re'];
        if(re){
            if(re.day===simDelta){
                // Today's re-pick: use the snapshot of what was there before
                const prev=sub[u+'_re_prev'];
                if(prev) return prev.value??null;
                // No snapshot yet — fall through to committed
            } else if(re.day<simDelta){
                // Any past re-pick: use it directly (fixes tasks re-surfacing after d+2)
                return re.value??null;
            }
        }
        return getSubValue(sub,u);
    };

    // mySub: show my re-pick if I've tapped this round, else committed pick
    const myRePick=past?sub[currentUser+'_re']:null;
    const mySub=(myRePick&&myRePick.day===simDelta)?myRePick.value:getSubValue(sub,currentUser);
    // otherSub: show other user's effective pick from last round (context for conflict note)
    const otherSub=effectivePick(otherUser);

    const anyUnsure=past&&USERS.some(u=>effectivePick(u)==='Unsure');
    const unsureMarkedBy=USERS.filter(u=>effectivePick(u)==='Unsure');
    const nonUnsureVals=USERS.map(u=>effectivePick(u)).filter(v=>v&&v!=='Unsure');
    // Conflict: past day, no Unsure, both users picked differently (based on last round)
    const isConflict=past&&!anyUnsure&&nonUnsureVals.length===USERS.length&&new Set(nonUnsureVals).size>1;
    const isCollapsing=collapsing.has(tx.id);

    const cardCls=['tx-card',isConflict?'conflict':'',isCollapsing?'collapsing':''].filter(Boolean).join(' ');

    function optClass(opt){
        if(opt==='Macquarie')return ' mac-btn';
        if(opt==='Unsure')return ' unsure-btn';
        if(opt==='Tony')return ' tony-btn';
        if(opt==='Nugs')return ' nugs-btn';
        return '';
    }
    function makeTap(opt,baseClass='tap-btn'){
        return {
            className:baseClass+optClass(opt),
            onPointerDown:e=>e.currentTarget.classList.add('flash'),
            onPointerUp:e=>{
                e.currentTarget.classList.remove('flash');
                const r=e.currentTarget.getBoundingClientRect();
                onAssign(tx.id,txKey,opt,{x:r.left+r.width/2,y:r.top+r.height/2});
            },
            onPointerLeave:e=>e.currentTarget.classList.remove('flash'),
            onPointerCancel:e=>e.currentTarget.classList.remove('flash'),
        };
    }

    return React.createElement('div',{className:cardCls},
        React.createElement('div',{className:'tx-top'},
            React.createElement('div',null,
                React.createElement('div',{className:'tx-meta'},
                    isConflict&&React.createElement('span',{className:'badge badge-conflict'},'⚠ conflict'),
                    anyUnsure &&React.createElement('span',{className:'badge badge-unsure'},'? unsure'),
                    autoConf  &&React.createElement('span',{className:'badge badge-auto'},'✓ auto'),
                ),
                React.createElement('p',{className:'tx-desc'},tx.desc)
            ),
            React.createElement('span',{className:'tx-amount'},'$'+tx.amount.toFixed(2))
        ),

        // If auto-confirmed, show read-only
        autoConf&&!isConflict
            ? React.createElement('p',{className:'my-pick-note'},
                'Auto-confirmed → ',React.createElement('span',{className:'my-pick-chip'},autoConf.value))

        // Conflict or unsure: show re-assign
        : (isConflict||anyUnsure)
            ? React.createElement('div',null,
                anyUnsure
                    // Unsure: show who flagged it, and what the OTHER person has chosen
                    ? React.createElement('p',{className:'my-pick-note'},
                        unsureMarkedBy.join(' & ')+' marked unsure'+(
                            otherSub&&otherSub!=='Unsure'
                                ? ' · '+otherUser+' picked '+otherSub
                                : !otherSub ? ' · '+otherUser+' hasn\'t picked yet' : ''
                        )+(
                            mySub&&mySub!=='Unsure'
                                ? ' · your pick: '+mySub : ''
                        )
                      )
                    // Conflict: show other person's pick
                    : React.createElement('p',{className:'my-pick-note'},
                        otherUser+' picked ',React.createElement('span',{className:'my-pick-chip'},otherSub||'—'),
                        mySub?' · your pick: '+mySub:' · tap to assign'
                      ),
                React.createElement('div',{className:'conflict-row'},
                    ASSIGN_OPTS.map(opt=>React.createElement('button',{key:opt,...makeTap(opt,'conflict-tap-btn')},opt))
                )
              )

        // Normal assign
        : React.createElement('div',{className:'assign-row'},
            React.createElement('span',{className:'assign-label'},'assign'),
            ASSIGN_OPTS.map(opt=>React.createElement('button',{key:opt,...makeTap(opt)},(opt==='Macquarie'?'MAC':opt)))
          )
    );
}

function PetCanvas({petType,hp}){
    const cvRef=useRef(null);
    const st=useRef({x:30,dir:1,frame:0,tick:0});
    const hpRef=useRef(hp);
    const typeRef=useRef(petType);
    useEffect(()=>{hpRef.current=hp;},[hp]);
    useEffect(()=>{typeRef.current=petType;},[petType]);

    useEffect(()=>{
        const cv=cvRef.current;
        if(!cv)return;
        const ctx=cv.getContext('2d');
        const S=3,SW=8,SH=12;

        function resize(){
            cv.width=cv.parentElement?.clientWidth||window.innerWidth;
            cv.height=SH*S+14; // 14 = 5 (HP bar area) + 9 (ground + pad)
        }
        resize();
        window.addEventListener('resize',resize);

        let raf;
        function loop(){
            const s=st.current;
            const pet=PETS_DATA[typeRef.current]||PETS_DATA.cat;
            const curHp=hpRef.current??60;
            ctx.clearRect(0,0,cv.width,cv.height);

            // HP bar (top, 3px)
            const bx=10,by=1,bh=3,bw=cv.width-20;
            ctx.fillStyle='rgba(255,255,255,0.07)';
            ctx.fillRect(bx,by,bw,bh);
            const hpCol=curHp>60?'#4ade80':curHp>30?'#fbbf24':'#f87171';
            ctx.fillStyle=hpCol;
            ctx.fillRect(bx,by,Math.max(1,Math.round(bw*curHp/100)),bh);

            // Ground line
            ctx.fillStyle='rgba(255,255,255,0.05)';
            ctx.fillRect(0,SH*S+8,cv.width,1);

            // Walk logic
            s.tick++;
            if(s.tick%6===0){
                s.x+=s.dir;
                if(s.tick%12===0) s.frame=1-s.frame;
                const maxX=cv.width-SW*S-12;
                if(s.x>=maxX){s.x=maxX;s.dir=-1;}
                else if(s.x<=12){s.x=12;s.dir=1;}
            }

            // Draw sprite (offset 5px down for HP bar)
            ctx.save();
            if(s.dir<0){ctx.translate(s.x+SW*S,5);ctx.scale(-1,1);}
            else{ctx.translate(s.x,5);}
            const rows=pet.frames[s.frame];
            for(let r=0;r<rows.length;r++){
                for(let c=0;c<rows[r].length;c++){
                    const p=rows[r][c];
                    if(p&&pet.pal[p]){ctx.fillStyle=pet.pal[p];ctx.fillRect(c*S,r*S,S,S);}
                }
            }
            ctx.restore();

            raf=requestAnimationFrame(loop);
        }
        raf=requestAnimationFrame(loop);
        return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
    },[]);

    return React.createElement('canvas',{ref:cvRef,style:{display:'block',width:'100%',imageRendering:'pixelated',imageRendering:'crisp-edges'}});
}

    const getEffectivePick = (id, u) => {
        const re = getSub(id)[u+'_re'];
        if (re) {
            if (re.day === simDelta) {
                const prev = getSub(id)[u+'_re_prev'];

    // Conflict: past day, no unsure, both users have picked differently (last round's picks).
    const isConflict = (id, txKey) => {
        if (!isPast(txKey)) return false;

    // remainingFor(u, tx, txKey):
    //
    // Core rules confirmed with user:
    //   1. Every tap closes the card — always. N tasks = N taps to clear.
    //   2. MY remaining decrements on each tap (uses sessRes for instant feedback).
    //   3. Other user's remaining = their unpicked cards + past-day conflicts/unsures.
    //   4. Conflicts are invisible same day. Only surface next day.
    //   5. Once conflict surfaces (next day), it counts as remaining for BOTH users
    //      until they each tap to re-resolve it this session.
    //
    // "Surfaced" conflict/unsure = isPast AND conflict/unsure exists in Firebase.
    // Both users need to re-tap to clear it from their remaining.
    // We track current user's taps via sessRes (local). Other user's taps tracked
    // by whether Firebase shows them having picked AFTER the conflict surfaced —
    // but since we can't timestamp the conflict surface, we use: if the other user
    // has a real pick AND the conflict still exists → they're still remaining.
    // When they re-tap, their Firebase pick updates → if still conflict, remains.
    // This means other user's remaining only drops when conflict fully resolves.
    //
    // Simpler: for other user, remaining = no pick OR Unsure OR conflict/unsure exists.
    // For current user, remaining = same but sessRes gives instant local drop.
    const remainingFor = (u, tx, txKey) => {
        if (isAutoConf(tx.id)) return false;
        const pick = getPick(tx.id, u);
        // TODAY: one tap to committed pick = done.
        if (isToday(txKey)) return !pick;
        // PAST DAY: check re-pick status FIRST before any early returns.
        // Re-picks go to _re slot; sessRes gives current user instant feedback.
        // This must come before !pick / Unsure checks so that tapping Unsure
        // (or tapping with no prior committed pick) still decrements remaining.
        if (u === user) {
            if (sessRes.has(tx.id)) return false;
        } else {
            const re = getSub(tx.id)[u+'_re'];
            if (re && re.day === simDelta) return false;
        }
        // User hasn't re-picked this round yet — are they needed?
        // Use effectivePick (committed OR last round's _re) so that users who only
        // resolved via re-pick (no committed pick written) aren't wrongly kept pending.
        const effective = getEffectivePick(tx.id, u);
        if (!effective) return true;             // never picked in any round
        if (effective === 'Unsure') return true; // effectively Unsure, needs re-resolution
        const conflict = isConflict(tx.id, txKey);
        const unsure   = isUnsurePinned(tx.id, txKey);

                React.createElement('div',{className:'shop-hp-bar'},
                    React.createElement('div',{className:'shop-hp-fill',
                        style:{width:petHp+'%',background:petHp>60?'#4ade80':petHp>30?'#fbbf24':'#f87171'}})
                ),
                React.createElement('span',{className:'shop-hp-val'},petHp)
            ),
            React.createElement('div',{className:'shop-divider-v'}),
            React.createElement('button',{className:'shop-btn buy',disabled:myCoins<1,
                onPointerDown:e=>e.currentTarget.style.opacity='0.55',
                onPointerUp:e=>{e.currentTarget.style.opacity='';buyFood();},
                onPointerLeave:e=>e.currentTarget.style.opacity='',
            },'buy food 1🪙'),
            React.createElement('button',{className:'shop-btn feed',disabled:myFood<1,
                onPointerDown:e=>e.currentTarget.style.opacity='0.55',
                onPointerUp:e=>{e.currentTarget.style.opacity='';feedPet();},
                onPointerLeave:e=>e.currentTarget.style.opacity='',
            },'feed 🍖'),
            React.createElement('div',{className:'shop-divider-v'}),
            React.createElement('span',{className:'pet-level'},
                'Lv.'+petLevel+' · '+xpThisLevel+'/'+xpNeeded+' xp')
        ),

        React.createElement('div',{className:'app'},
            React.createElement('div',{className:'app-header'},
                React.createElement('h1',{className:'app-title'},'💳 Transactions'),
                React.createElement('div',{className:'header-right'},
                    React.createElement('button',{className:'undo-btn',disabled:!undoStack.length,onClick:undo},'↩ undo'),
                    React.createElement('button',{className:'user-badge',onClick:()=>setSwitch(true)},
                        user[0],' ',user,' ↕')
                )
            ),

            // Stats: just two boxes
            React.createElement('div',{className:'stats-grid'},
                React.createElement('div',{className:'stat-box me'},
                    React.createElement('div',{className:'stat-val'},myRemaining),
                    React.createElement('div',{className:'stat-label'},'my remaining')
                ),
                React.createElement('div',{className:'stat-box'},
                    React.createElement('div',{className:'stat-val'},otherRemaining),
                    React.createElement('div',{className:'stat-label'},otherUser+'\'s remaining')
                )
            ),

            !anyVisible
                ? React.createElement(AllDone,{msg:doneMsg.current,onMount:()=>{
                    if(!confettiFiredRef.current){confettiFiredRef.current=true;window.launchConfetti&&window.launchConfetti();}
                  }})
                : React.createElement('div',null,
                    groups.map(({txKey,visible,past,label,date})=>
                        React.createElement('div',{key:txKey,className:'day-group'},
                            React.createElement('div',{className:'day-group-header'},
                                past&&React.createElement('span',{className:'attention-dot'}),
                                React.createElement('span',{className:'day-label-pill '+(past?'past':'today')},label),
                                React.createElement('div',{className:'day-line '+(past?'past':'')}),
                                past
                                    ? React.createElement('span',{className:'attention-tag'},'attention · '+date)
                                    : React.createElement('span',{className:'day-date'},date)
                            ),
                            visible.map(tx=>React.createElement(TxCard,{
                                key:tx.id,tx,txKey,simDelta,currentUser:user,
                                subs,onAssign:assign,collapsing,nowMs:simNow
                            }))
                        )
                    )
                  )
        ),

        // Pixel pet footer — walks back and forth
        React.createElement('div',{className:'pet-footer'},
            React.createElement(PetCanvas,{petType,hp:petHp})
        )
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
