            outline: none;

        .switch-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); display:flex; align-items:center; justify-content:center; z-index:100; padding:2rem; }
        .switch-card { background:#0f1318; border:1px solid rgba(255,255,255,0.09); border-radius:14px; padding:2rem; width:100%; max-width:320px; text-align:center; }

        .all-done-inner { animation:fadeUp 0.6s ease forwards; }
        .all-done-emoji { font-size:3.2rem; display:block; margin-bottom:0.8rem; animation:pop 0.5s cubic-bezier(.36,.07,.19,.97) 0.15s both; }
        .all-done-title { font-family:'Fraunces',serif; font-size:2rem; font-weight:300; color:#f1f0ec; margin-bottom:0.5rem; line-height:1.2; }
        .all-done-sub { font-size:0.72rem; color:#4b5563; margin-bottom:1.5rem; }
        .all-done-streak { display:inline-block; font-size:0.62rem; letter-spacing:0.15em; text-transform:uppercase; color:#60a5fa; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); border-radius:20px; padding:0.3rem 0.8rem; animation:fadeUp 0.5s ease 0.5s both; }

        /* Confetti canvas */
        #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:200; width:100%; height:100%; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.25)} 80%{transform:scale(0.95)} 100%{transform:scale(1);opacity:1} }
    </style>
</head>
<body>
<canvas id="confetti-canvas" style="display:none"></canvas>
<div id="root"></div>
<script>
// ── Confetti engine ────────────────────────────────────────
(function() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], raf = null, running = false;

    const COLORS = ['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#e8e6e1'];
    function rand(a,b){return Math.random()*(b-a)+a;}

    function spawn(n) {
        for(let i=0;i<n;i++) {
            const angle = rand(-0.5,0.5);
            particles.push({
                x: rand(0.2,0.8)*canvas.width,
                y: rand(-50,-10),
                vx: Math.sin(angle)*rand(1,4)*( Math.random()<0.5?1:-1),
                vy: rand(3,8),
                rot: rand(0,Math.PI*2),
                rotV: rand(-0.12,0.12),
                w: rand(7,14), h: rand(4,8),
                color: COLORS[Math.floor(Math.random()*COLORS.length)],
                alpha:1, life:1
            });
        }
    }

    function tick() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles = particles.filter(p => p.alpha > 0.01);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.15; p.rot += p.rotV;
            if(p.y > canvas.height*0.7) p.alpha -= 0.025;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.translate(p.x,p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
        });
        if(particles.length > 0) raf = requestAnimationFrame(tick);
        else { canvas.style.display='none'; running=false; }
    }

    window.launchConfetti = function() {
        canvas.style.display='block';
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        spawn(110);
        if(!running){ running=true; raf=requestAnimationFrame(tick); }
        // Second burst
        setTimeout(()=>spawn(70), 400);
    };
})();

// ── React app ─────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback } = React;

const USERS       = ['Tony', 'Nugs', 'Macquarie'];
const ALL_OPTS    = [...USERS, 'Unsure'];
const STORAGE_KEY = 'cc_submissions_v2';
const USER_KEY    = 'cc_current_user_v2';

const TX_BY_DAYOFF = {
    '0': [
        { id:'d0-0', amount:75.00,   description:'VELOCITY REWARDS FEE' },
        { id:'d0-1', amount:295.00,  description:'CARD FEE' },
        { id:'d0-2', amount:32.21,   description:'ALIEXPRESS North Sydney' },
        { id:'d0-3', amount:18.50,   description:'UBER EATS Melbourne' },
        { id:'d0-4', amount:12.90,   description:'MCDONALDS Sunshine' },
    ],
    '-1': [
        { id:'d1-0', amount:1468.00, description:'FOREIGN FEE AUD 8.01' },
        { id:'d1-1', amount:275.05,  description:'KICKSTARTER.COM Tsimshatsui' },
        { id:'d1-2', amount:54.40,   description:'SPOTIFY PREMIUM' },
        { id:'d1-3', amount:11.00,   description:'GOOGLE ONE Storage' },
    ],
    '-2': [
        { id:'d2-0', amount:98.00,   description:'GU HEALTH REWARDS Camberwell' },
        { id:'d2-1', amount:89.50,   description:'COLES Footscray' },
        { id:'d2-2', amount:45.00,   description:'BUNNINGS Warehouse' },
    ],
    '-3': [
        { id:'d3-0', amount:210.00,  description:'ELECTRICITY BILL AGL' },
        { id:'d3-1', amount:9.99,    description:'NETFLIX.COM' },
        { id:'d3-2', amount:65.00,   description:'INTERNET BILL Aussie BB' },
    ],
    '1': [
        { id:'df1-0', amount:55.00,  description:'MEDICARE LEVY PAYMENT' },
        { id:'df1-1', amount:149.00, description:'OFFICEWORKS Footscray' },
        { id:'df1-2', amount:28.90,  description:'THAI ORCHID Restaurant' },
    ],
    '2': [
        { id:'df2-0', amount:499.00, description:'JB HIFI Melbourne CBD' },
        { id:'df2-1', amount:19.99,  description:'ADOBE CREATIVE CLOUD' },
        { id:'df2-2', amount:72.00,  description:'RACV MEMBERSHIP' },
    ],
    '3': [
        { id:'df3-0', amount:330.00, description:'QANTAS AIRWAYS Sydney' },
        { id:'df3-1', amount:42.80,  description:'SHELL COLES EXPRESS Footscray' },
    ],
};

function isoDate(offset) {
    const d = new Date(); d.setDate(d.getDate()+offset);
    return d.toISOString().slice(0,10);
}

function dayLabel(txDayOff, simDelta) {
    const rel = txDayOff - simDelta;
    if(rel===0)  return 'today';
    if(rel===-1) return 'yesterday';
    return Math.abs(rel)+'d ago';
}

// Is conflict/unsure visible? Only after the tx's day has passed (txDayOff < simDelta)
function isNextDayVisible(txDayOff, simDelta) { return txDayOff < simDelta; }

const DONE_MSGS = [
    { emoji:'🎉', title:"All done!", sub:'Every transaction is sorted. Legends.' },
    { emoji:'🏆', title:'Clean sweep!', sub:'Nothing left to action today.' },
    { emoji:'✨', title:'That\'s everything!', sub:'You\'re both on top of it.' },
    { emoji:'🚀', title:'Done and dusted!', sub:'Go enjoy the rest of your day.' },
];

function loadSubs() {
    try { const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):{}; } catch(e){return{};}
}

// ── Flash helper — adds class briefly, auto-removes ──
function flashBtn(el) {
    if(!el) return;
    el.classList.add('flash');
    setTimeout(()=>{ if(el) el.classList.remove('flash'); }, 150);
}

// ── Landing ──
function LandingPage({ onSelect }) {
    return React.createElement('div', {className:'landing'},
        React.createElement('div', {className:'landing-card'},
            React.createElement('p',  {className:'landing-eyebrow'}, '💳 Credit Card'),
            React.createElement('h1', {className:'landing-title'}, 'Who are\nyou?'),
            React.createElement('p',  {className:'landing-sub'}, 'Select your name to continue'),
            React.createElement('p',  {className:'who-label'}, 'I am…'),
            ...USERS.map(u=>
                React.createElement('button',{key:u,className:'user-btn',onClick:()=>onSelect(u)},
                    React.createElement('span',{className:'user-initial'},u[0]), u)
            ),
            React.createElement('p',{className:'landing-footer'},'Westpac • Transaction reconciliation')
        )
    );
}

// ── Switch overlay ──
function SwitchOverlay({currentUser,onSelect,onClose}) {
    return React.createElement('div',{className:'switch-overlay',onClick:onClose},
        React.createElement('div',{className:'switch-card',onClick:e=>e.stopPropagation()},
            React.createElement('p',{className:'switch-title'},'Switch user'),
            React.createElement('p',{className:'switch-sub'},'Signed in as '+currentUser),
            ...USERS.map(u=>
                React.createElement('button',{key:u,className:'user-btn',style:{opacity:u===currentUser?0.3:1},onClick:()=>{onSelect(u);onClose();}},
                    React.createElement('span',{className:'user-initial'},u[0]),u)
            )
        )
    );
}

// ── TxCard ──
function TxCard({tx, dayOff, simDelta, currentUser, submissions, onAssign, collapsing}) {
    const sub      = submissions[tx.id] || {};
    const mySub    = sub[currentUser] ?? null;
    const nextDayOk= isNextDayVisible(dayOff, simDelta);

    // Conflict: any two non-unsure users disagree — only visible next day
    const nonUnsureVals = USERS.map(u=>sub[u]).filter(v=>v!=null && v!=='Unsure');
    const isConflict    = nextDayOk && nonUnsureVals.length > 1 && new Set(nonUnsureVals).size > 1;

    // Unsure pin: visible next day only
    const anyUnsure = nextDayOk && USERS.some(u=>sub[u]==='Unsure');

    const isCollapsing = collapsing.has(tx.id);
    const cardClass = ['tx-card', isConflict?'conflict':'', isCollapsing?'collapsing':''].filter(Boolean).join(' ');

    const handleAssign = useCallback((opt, e) => {
        flashBtn(e.currentTarget);
        onAssign(tx.id, dayOff, opt);
    }, [tx.id, dayOff, onAssign]);

    return React.createElement('div', {className:cardClass},
        React.createElement('div',{className:'tx-top'},
            React.createElement('div',null,
                React.createElement('div',{className:'tx-meta'},
                    isConflict && React.createElement('span',{className:'badge badge-conflict'},'⚠ conflict'),
                    anyUnsure  && React.createElement('span',{className:'badge',style:{background:'rgba(245,158,11,0.14)',color:'#fbbf24'}},'? unsure'),
                ),
                React.createElement('p',{className:'tx-desc'},tx.description)
            ),
            React.createElement('span',{className:'tx-amount'},'$'+tx.amount.toFixed(2))
        ),

        isConflict || anyUnsure
            ? React.createElement('div',null,
                React.createElement('p',{className:'conflict-note'}, isConflict?'Tap to update your pick:':'Needs decision:'),
                React.createElement('div',{className:'conflict-assign'},
                    ALL_OPTS.map(opt=>
                        React.createElement('button',{
                            key:opt,
                            className:'conflict-tap-btn'+(opt==='Unsure'?' unsure-btn':''),
                            onPointerDown: e=>{ e.currentTarget.classList.add('flash'); },
                            onPointerUp:   e=>{ e.currentTarget.classList.remove('flash'); handleAssign(opt,e); },
                            onPointerLeave:e=>{ e.currentTarget.classList.remove('flash'); },
                        }, opt===mySub ? '✓ '+opt : opt)
                    )
                )
              )
            : React.createElement('div',{className:'assign-row'},
                React.createElement('span',{className:'assign-label'},'assign'),
                USERS.map(opt=>
                    React.createElement('button',{
                        key:opt,
                        className:'tap-btn',
                        onPointerDown: e=>{ e.currentTarget.classList.add('flash'); },
                        onPointerUp:   e=>{ e.currentTarget.classList.remove('flash'); handleAssign(opt,e); },
                        onPointerLeave:e=>{ e.currentTarget.classList.remove('flash'); },
                    }, opt)
                ),
                React.createElement('button',{
                    className:'tap-btn unsure-btn',
                    onPointerDown: e=>{ e.currentTarget.classList.add('flash'); },
                    onPointerUp:   e=>{ e.currentTarget.classList.remove('flash'); handleAssign('Unsure',e); },
                    onPointerLeave:e=>{ e.currentTarget.classList.remove('flash'); },
                }, '?')
              )
    );
}

// ── All Done screen ──
function AllDone({msg}) {
    useEffect(()=>{
        window.launchConfetti && window.launchConfetti();
    },[]);
    return React.createElement('div',{className:'all-done'},
        React.createElement('div',{className:'all-done-inner'},
            React.createElement('span',{className:'all-done-emoji'},msg.emoji),
            React.createElement('h2', {className:'all-done-title'},msg.title),
            React.createElement('p',  {className:'all-done-sub'},msg.sub),
            React.createElement('span',{className:'all-done-streak'},'💳 all transactions assigned')
        )
    );
}

// ── Main App ──
function CreditCardApp() {
    const [currentUser, setCurrentUser] = useState(null);
    const [submissions, setSubmissions]  = useState({});
    const [showSwitch,  setShowSwitch]   = useState(false);
    const [simDelta,    setSimDelta]     = useState(0);
    const [collapsing,  setCollapsing]   = useState(new Set());
    const [undoStack,   setUndoStack]    = useState([]);
    const doneMsg = useRef(DONE_MSGS[Math.floor(Math.random()*DONE_MSGS.length)]);
    const prevAllDone = useRef(false);

    useEffect(()=>{
        const u=localStorage.getItem(USER_KEY);
        if(u && USERS.includes(u)) setCurrentUser(u);
        setSubmissions(loadSubs());
    },[]);

    const saveSubs = s=>{ setSubmissions(s); localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); };

    const selectUser = u=>{
        setCurrentUser(u); localStorage.setItem(USER_KEY,u);
        setSubmissions(loadSubs()); setCollapsing(new Set()); setUndoStack([]); setShowSwitch(false);
    };

    const resetCache = ()=>{
        if(!confirm('Reset all data?')) return;
        localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(USER_KEY);
        setSubmissions({}); setCollapsing(new Set()); setUndoStack([]); setCurrentUser(null);
    };

    const getSub  = id=>(submissions[id]||{});
    const myPick  = id=>getSub(id)[currentUser]??null;

    const isConflict = (txId, dayOff)=>{
        if(!isNextDayVisible(dayOff,simDelta)) return false;
        const vals=USERS.map(u=>getSub(txId)[u]).filter(v=>v!=null&&v!=='Unsure');
        return vals.length>1 && new Set(vals).size>1;
    };

    const isUnsurePinned = (txId, dayOff)=>
        isNextDayVisible(dayOff,simDelta) && USERS.some(u=>getSub(txId)[u]==='Unsure');

    // Card visible if user hasn't picked, or conflict, or unsure-pinned
    const isVisible = (tx, dayOff)=>{
        if(collapsing.has(tx.id)) return true;
        const pick = myPick(tx.id);
        return isConflict(tx.id,dayOff) || isUnsurePinned(tx.id,dayOff) || pick===null;
    };

    const assign = (txId, txDayOff, assignTo)=>{
        const prev=myPick(txId);
        setUndoStack(s=>[...s,{txId,user:currentUser,prev}]);
        const newSubs={...submissions,[txId]:{...submissions[txId],[currentUser]:assignTo}};
        saveSubs(newSubs);

        if(assignTo!=='Unsure') {
            setTimeout(()=>{
                const sub=newSubs[txId]||{};
                const vals=USERS.map(u=>sub[u]).filter(v=>v!=null&&v!=='Unsure');
                const conflict=isNextDayVisible(txDayOff,simDelta)&&vals.length>1&&new Set(vals).size>1;
                const unsured =isNextDayVisible(txDayOff,simDelta)&&USERS.some(u=>sub[u]==='Unsure');
                if(!conflict&&!unsured) setCollapsing(c=>new Set([...c,txId]));
            },220);
        }
    };

    const undo = ()=>{
        if(!undoStack.length) return;
        const last=undoStack[undoStack.length-1];
        setUndoStack(s=>s.slice(0,-1));
        setCollapsing(c=>{const n=new Set(c);n.delete(last.txId);return n;});
        saveSubs({...submissions,[last.txId]:{...submissions[last.txId],[last.user]:last.prev}});
    };

    // Day offsets window: simDelta down to simDelta-3
    const allDayOffsets=[];
    for(let d=simDelta;d>=simDelta-3;d--) { if(TX_BY_DAYOFF[String(d)]) allDayOffsets.push(d); }

    // ── Tallies: per user, based on THEIR OWN pick (not consensus) ──
    // This gives each user a running sense of their share
    const tallies=Object.fromEntries(USERS.map(u=>[u,0]));
    Object.entries(TX_BY_DAYOFF).forEach(([,txList])=>{
        txList.forEach(tx=>{
            USERS.forEach(u=>{
                const pick=getSub(tx.id)[u];
                if(pick && pick!=='Unsure' && pick===u) tallies[u]+=tx.amount;
            });
        });
    });
    // More useful: sum of transactions user assigned to themselves
    const tallyOwn=Object.fromEntries(USERS.map(u=>[u,0]));
    Object.entries(TX_BY_DAYOFF).forEach(([,txList])=>{
        txList.forEach(tx=>{
            USERS.forEach(u=>{
                const pick=getSub(tx.id)[u];
                if(pick && pick!=='Unsure') tallyOwn[pick]=(tallyOwn[pick]||0)+tx.amount;
            });
        });
    });

    if(!currentUser) return React.createElement(LandingPage,{onSelect:u=>{setCurrentUser(u);localStorage.setItem(USER_KEY,u);setSubmissions(loadSubs());}});

    // Build visible groups
    const groups=allDayOffsets.map(dayOff=>{
        const raw=TX_BY_DAYOFF[String(dayOff)]||[];
        const txList=raw.map(t=>({...t,dayOff,date:isoDate(dayOff)}));
        const visible=txList.filter(tx=>isVisible(tx,dayOff));
        const active=visible.filter(tx=>!collapsing.has(tx.id));
        return {dayOff,visible,active};
    }).filter(g=>g.active.length>0);

    // Stats
    let totalTx=0,totalPending=0,totalConflicts=0;
    allDayOffsets.forEach(dayOff=>{
        const txList=TX_BY_DAYOFF[String(dayOff)]||[];
        totalTx+=txList.length;
        txList.forEach(tx=>{
            if(isConflict(tx.id,dayOff)) totalConflicts++;
            else if(myPick(tx.id)===null) totalPending++;
        });
    });

    const anyVisible=groups.length>0;
    const simLabel=simDelta===0?'today':simDelta>0?`+${simDelta}d`:`${Math.abs(simDelta)}d ago`;

    const stepDay=delta=>{ setSimDelta(d=>d+delta); setCollapsing(new Set()); };

    return React.createElement('div',null,
        showSwitch && React.createElement(SwitchOverlay,{currentUser,onSelect:selectUser,onClose:()=>setShowSwitch(false)}),

        // Dev banner
        React.createElement('div',{className:'dev-banner'},
            React.createElement('span',{className:'dev-label'},'🛠 dev'),
            React.createElement('button',{className:'day-btn',onClick:()=>stepDay(-1)},'◀ prev'),
            React.createElement('span',{className:'day-display'},simLabel),
            React.createElement('button',{className:'day-btn',onClick:()=>stepDay(1)},'next ▶'),
            React.createElement('button',{className:'day-btn',style:{color:'#6b7280',borderColor:'rgba(107,114,128,0.2)',background:'transparent'},onClick:()=>{setSimDelta(0);setCollapsing(new Set());}},'reset'),
            React.createElement('span',{className:'dev-sep'},'|'),
            React.createElement('button',{className:'reset-cache-btn',onClick:resetCache},'🗑 clear'),
        ),

        // Tally bar — per user, based on their picks
        React.createElement('div',{className:'tally-bar'},
            USERS.flatMap((u,i)=>[
                i>0?React.createElement('div',{key:'sep'+i,style:{width:'1px',background:'rgba(255,255,255,0.05)'}}):null,
                React.createElement('div',{key:u,className:'tally-item'},
                    React.createElement('div',{className:'tally-name'},u),
                    React.createElement('div',{className:'tally-amount'},'$'+(tallyOwn[u]||0).toFixed(2)),
                    React.createElement('div',{className:'tally-note'},'your picks')
                )
            ]).filter(Boolean)
        ),

        React.createElement('div',{className:'app'},
            React.createElement('div',{className:'app-header'},
                React.createElement('h1',{className:'app-title'},'💳 Transactions'),
                React.createElement('div',{className:'header-right'},
                    React.createElement('button',{className:'undo-btn',disabled:undoStack.length===0,onClick:undo},'↩ undo'),
                    React.createElement('button',{className:'user-badge',onClick:()=>setShowSwitch(true)},
                        currentUser[0],' ',currentUser,' ↕')
                )
            ),

            React.createElement('div',{className:'stats-grid'},
                [{label:'Total',value:totalTx},{label:'Pending',value:totalPending},{label:'Conflicts',value:totalConflicts}]
                .map(s=>React.createElement('div',{key:s.label,className:'stat-box'},
                    React.createElement('div',{className:'stat-val'},s.value),
                    React.createElement('div',{className:'stat-label'},s.label)
                ))
            ),

            !anyVisible
                ? React.createElement(AllDone,{msg:doneMsg.current})
                : React.createElement('div',null,
                    groups.map(({dayOff,visible})=>{
                        const label=dayLabel(dayOff,simDelta);
                        const isToday=(dayOff===simDelta);
                        const isOld=(dayOff<simDelta); // past days
                        const date=isoDate(dayOff);
                        const cards=visible.filter(tx=>!collapsing.has(tx.id));
                        if(!cards.length) return null;

                        return React.createElement('div',{key:dayOff,className:'day-group'},
                            // Day header with optional attention indicator
                            React.createElement('div',{className:'day-group-header'},
                                isOld && React.createElement('span',{className:'attention-dot'}),
                                React.createElement('span',{
                                    className:'day-label-text'+(isToday?' is-today':''),
                                    style:isOld?{color:'#f59e0b'}:{}
                                }, label),
                                React.createElement('div',{className:'day-group-line'+(isOld?' attention':'')}),
                                React.createElement('span',{
                                    className:'day-group-date',
                                    style:isOld?{color:'rgba(245,158,11,0.4)'}:{}
                                }, isOld ? '⚠ attention required · '+date : date)
                            ),
                            visible.map(tx=>
                                React.createElement(TxCard,{
                                    key:tx.id,tx,dayOff,simDelta,currentUser,
                                    submissions,onAssign:assign,collapsing
                                })
                            )
                        );
                    }).filter(Boolean)
                  )
        )
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CreditCardApp));
</script>
</body>
</html>
