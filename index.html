<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Credit Card Consolidation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0d12; color: #e8e6e1; font-family: 'DM Mono', monospace; min-height: 100vh; }

        /* ── Landing ── */
        .landing {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem;
            background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 60%), #0a0d12;
        }
        .landing-card { width: 100%; max-width: 360px; text-align: center; }
        .landing-eyebrow { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: #4b5563; margin-bottom: 1.5rem; }
        .landing-title { font-family: 'Fraunces', serif; font-size: 2.4rem; font-weight: 300; color: #f1f0ec; line-height: 1.15; margin-bottom: 0.5rem; }
        .landing-sub { font-size: 0.72rem; color: #4b5563; margin-bottom: 3rem; letter-spacing: 0.05em; }
        .who-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6b7280; margin-bottom: 1rem; }
        .user-btn {
            display: block; width: 100%; padding: 1rem 1.5rem; margin-bottom: 0.75rem;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; color: #e8e6e1; font-family: 'Fraunces', serif;
            font-size: 1.4rem; font-weight: 300; cursor: pointer; transition: all 0.2s ease; text-align: left;
        }
        .user-btn:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); transform: translateX(4px); }
        .user-initial {
            display: inline-block; width: 32px; height: 32px;
            background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.25);
            border-radius: 50%; text-align: center; line-height: 32px; font-size: 0.9rem;
            margin-right: 0.75rem; vertical-align: middle; font-family: 'DM Mono', monospace; color: #60a5fa;
        }
        .landing-footer { margin-top: 3rem; font-size: 0.6rem; color: #374151; letter-spacing: 0.1em; }

        /* ── Dev banner ── */
        .dev-banner {
            background: rgba(234,179,8,0.06); border-bottom: 1px solid rgba(234,179,8,0.15);
            padding: 0.4rem 0.75rem; display: flex; align-items: center; justify-content: center;
            gap: 0.5rem; flex-wrap: wrap;
        }
        .dev-label { font-size: 0.54rem; letter-spacing: 0.15em; text-transform: uppercase; color: #92400e; }
        .day-display { font-size: 0.66rem; color: #fbbf24; min-width: 72px; text-align: center; }
        .day-btn {
            background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.2);
            border-radius: 4px; color: #d97706; font-family: 'DM Mono', monospace;
            font-size: 0.66rem; padding: 0.16rem 0.5rem; cursor: pointer; transition: background 0.15s;
        }
        .day-btn:hover { background: rgba(234,179,8,0.2); }
        .dev-sep { color: rgba(255,255,255,0.1); }
        .reset-cache-btn {
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
            border-radius: 4px; color: #f87171; font-family: 'DM Mono', monospace;
            font-size: 0.66rem; padding: 0.16rem 0.5rem; cursor: pointer; transition: background 0.15s;
        }
        .reset-cache-btn:hover { background: rgba(239,68,68,0.18); }

        /* ── Tally bar ── */
        .tally-bar { background: rgba(255,255,255,0.015); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; }
        .tally-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0.5rem; border-right: 1px solid rgba(255,255,255,0.05); }
        .tally-item:last-child { border-right: none; }
        .tally-name { font-size: 0.54rem; letter-spacing: 0.18em; text-transform: uppercase; color: #4b5563; margin-bottom: 0.15rem; }
        .tally-amount { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 300; color: #93c5fd; }

        /* ── App ── */
        .app { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 5rem; }
        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .app-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 300; color: #f1f0ec; }
        .header-right { display: flex; align-items: center; gap: 0.45rem; }
        .user-badge {
            display: flex; align-items: center; gap: 0.3rem; font-size: 0.66rem; color: #60a5fa;
            background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
            border-radius: 20px; padding: 0.26rem 0.65rem; cursor: pointer;
        }
        .undo-btn {
            font-size: 0.64rem; color: #9ca3af; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 0.26rem 0.6rem;
            cursor: pointer; transition: all 0.15s; font-family: 'DM Mono', monospace;
        }
        .undo-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #e8e6e1; }
        .undo-btn:disabled { opacity: 0.22; cursor: default; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-bottom: 1rem; }
        .stat-box { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 0.5rem 0.4rem; text-align: center; }
        .stat-val { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 300; color: #f1f0ec; line-height: 1; }
        .stat-label { font-size: 0.48rem; letter-spacing: 0.12em; text-transform: uppercase; color: #4b5563; margin-top: 0.2rem; }

        /* ── Unsure pin section ── */
        .unsure-section { margin-bottom: 1.1rem; }
        .unsure-header {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.45rem;
        }
        .unsure-label {
            font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
            color: #f59e0b; white-space: nowrap;
        }
        .unsure-line { flex: 1; height: 1px; background: rgba(245,158,11,0.2); }

        /* ── Day group ── */
        .day-group { margin-bottom: 1.1rem; }
        .day-group-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; }
        .day-group-label { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: #4b5563; white-space: nowrap; }
        .day-group-label.today { color: #60a5fa; }
        .day-group-line { flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        .day-group-date { font-size: 0.52rem; color: #2d3748; white-space: nowrap; }

        /* ── Cards ── */
        .tx-card {
            border-radius: 9px; padding: 0.7rem; margin-bottom: 0.38rem;
            border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02);
            overflow: hidden;
            transition: max-height 0.28s ease, opacity 0.22s ease, padding 0.28s, margin 0.28s, border-width 0.28s;
            max-height: 200px;
        }
        .tx-card.conflict { border-color: rgba(239,68,68,0.38); background: rgba(239,68,68,0.04); }
        .tx-card.unsure-card { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.03); }
        .tx-card.collapsing {
            max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important;
            margin-bottom: 0 !important; opacity: 0; border-width: 0 !important;
        }

        .tx-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.45rem; }
        .tx-desc { font-size: 0.75rem; color: #d1cfc9; }
        .tx-meta { display: flex; gap: 0.28rem; align-items: center; margin-bottom: 0.18rem; }
        .badge { font-size: 0.52rem; padding: 0.07rem 0.36rem; border-radius: 3px; }
        .badge-conflict { background: rgba(239,68,68,0.16); color: #f87171; }
        .badge-unsure   { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .tx-amount { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 300; color: #93c5fd; white-space: nowrap; padding-left: 0.4rem; }

        /* ── Assign buttons — NEVER have an active/selected visual state ── */
        .assign-row { display: flex; gap: 0.28rem; align-items: center; }
        .assign-label { font-size: 0.5rem; color: #2d3748; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
        .tap-btn {
            flex: 1; padding: 0.4rem 0.3rem; border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03);
            color: #6b7280; font-family: 'DM Mono', monospace; font-size: 0.68rem;
            cursor: pointer; text-align: center;
            /* NO transition — prevents any lingering active state */
        }
        .tap-btn:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.25); color: #d1d5db; }
        .tap-btn.unsure-btn {
            color: #92400e; border-color: rgba(245,158,11,0.15); background: rgba(245,158,11,0.05);
        }
        .tap-btn.unsure-btn:hover { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); color: #fbbf24; }

        /* Conflict re-assign — NO highlight on any button by default */
        .conflict-note { font-size: 0.58rem; color: #6b7280; margin-bottom: 0.35rem; }
        .conflict-assign { display: flex; gap: 0.28rem; }
        .conflict-tap-btn {
            flex: 1; padding: 0.4rem 0.3rem; border-radius: 5px;
            border: 1px solid rgba(239,68,68,0.2); background: rgba(239,68,68,0.06);
            color: #f87171; font-family: 'DM Mono', monospace; font-size: 0.68rem;
            cursor: pointer; text-align: center;
            /* deliberately no active/mine class */
        }
        .conflict-tap-btn:hover { background: rgba(239,68,68,0.14); }

        /* Switch overlay */
        .switch-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 2rem; }
        .switch-card { background: #0f1318; border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 2rem; width: 100%; max-width: 320px; text-align: center; }
        .switch-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 300; margin-bottom: 0.35rem; color: #f1f0ec; }
        .switch-sub { font-size: 0.62rem; color: #4b5563; margin-bottom: 1.5rem; }

        /* All done */
        .all-done { text-align: center; padding: 4rem 2rem; animation: fadeUp 0.5s ease forwards; }
        .all-done-emoji { font-size: 3.5rem; margin-bottom: 1rem; display: block; animation: pop 0.4s ease 0.2s both; }
        .all-done-title { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 300; color: #f1f0ec; margin-bottom: 0.5rem; }
        .all-done-sub { font-size: 0.72rem; color: #4b5563; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
    </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;

// All possible assignees — UNSURE is a special value, not a real user
const USERS   = ['Tony', 'Nugs'];
const ALL_OPTS = ['Tony', 'Nugs', 'Unsure'];
const STORAGE_KEY = 'cc_submissions';
const USER_KEY    = 'cc_current_user';

// ── Transaction data per simulated day offset ─────────────
// Reduced to today + 2 past days for testing
const TX_BY_DAYOFF = {
    '0': [
        { id: 'd0-0', amount: 75.00,   description: 'VELOCITY REWARDS FEE' },
        { id: 'd0-1', amount: 295.00,  description: 'CARD FEE' },
        { id: 'd0-2', amount: 32.21,   description: 'ALIEXPRESS North Sydney' },
        { id: 'd0-3', amount: 18.50,   description: 'UBER EATS Melbourne' },
        { id: 'd0-4', amount: 12.90,   description: 'MCDONALDS Sunshine' },
    ],
    '-1': [
        { id: 'd1-0', amount: 1468.00, description: 'FOREIGN FEE AUD 8.01' },
        { id: 'd1-1', amount: 275.05,  description: 'KICKSTARTER.COM Tsimshatsui' },
        { id: 'd1-2', amount: 54.40,   description: 'SPOTIFY PREMIUM' },
    ],
    '-2': [
        { id: 'd2-0', amount: 98.00,   description: 'GU HEALTH REWARDS Camberwell' },
        { id: 'd2-1', amount: 89.50,   description: 'COLES Footscray' },
    ],
    '1': [
        { id: 'df1-0', amount: 55.00,  description: 'MEDICARE LEVY PAYMENT' },
        { id: 'df1-1', amount: 149.00, description: 'OFFICEWORKS Footscray' },
        { id: 'df1-2', amount: 28.90,  description: 'THAI ORCHID Restaurant' },
    ],
    '2': [
        { id: 'df2-0', amount: 499.00, description: 'JB HIFI Melbourne CBD' },
        { id: 'df2-1', amount: 19.99,  description: 'ADOBE CREATIVE CLOUD' },
    ],
};

function isoDate(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0, 10);
}

function dayLabel(txDayOff, simDelta) {
    const rel = txDayOff - simDelta;
    if (rel === 0)  return 'today';
    if (rel === -1) return 'yesterday';
    return Math.abs(rel) + ' days ago';
}

// Conflict visible only when we've advanced past the tx's day
function conflictVisible(txDayOff, simDelta) {
    return txDayOff < simDelta;
}

const DONE_MSGS = [
    { emoji: '🎉', title: "That's all for today!", sub: 'Nothing left to assign. Nice work.' },
    { emoji: '✅', title: 'All sorted!',            sub: 'You two are on top of it.' },
    { emoji: '🙌', title: 'Clean slate!',           sub: 'Every transaction is assigned.' },
    { emoji: '💪', title: 'Done and dusted!',       sub: 'Go enjoy your day.' },
];

// Load submissions fresh from localStorage
function loadSubmissions() {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : {}; }
    catch(e) { return {}; }
}

// ── Landing ──────────────────────────────────────────────
function LandingPage({ onSelect }) {
    return React.createElement('div', { className: 'landing' },
        React.createElement('div', { className: 'landing-card' },
            React.createElement('p', { className: 'landing-eyebrow' }, '💳 Credit Card'),
            React.createElement('h1', { className: 'landing-title' }, 'Who are\nyou?'),
            React.createElement('p', { className: 'landing-sub' }, 'Select your name to continue'),
            React.createElement('p', { className: 'who-label' }, 'I am…'),
            ...USERS.map(u =>
                React.createElement('button', { key: u, className: 'user-btn', onClick: () => onSelect(u) },
                    React.createElement('span', { className: 'user-initial' }, u[0]), u
                )
            ),
            React.createElement('p', { className: 'landing-footer' }, 'Westpac • Transaction reconciliation')
        )
    );
}

// ── Switch overlay ────────────────────────────────────────
function SwitchOverlay({ currentUser, onSelect, onClose }) {
    return React.createElement('div', { className: 'switch-overlay', onClick: onClose },
        React.createElement('div', { className: 'switch-card', onClick: e => e.stopPropagation() },
            React.createElement('p', { className: 'switch-title' }, 'Switch user'),
            React.createElement('p', { className: 'switch-sub' }, 'Signed in as ' + currentUser),
            ...USERS.map(u =>
                React.createElement('button', {
                    key: u, className: 'user-btn',
                    style: { opacity: u === currentUser ? 0.3 : 1 },
                    onClick: () => { onSelect(u); onClose(); }
                }, React.createElement('span', { className: 'user-initial' }, u[0]), u)
            )
        )
    );
}

// ── Transaction Card ──────────────────────────────────────
// Isolated component so it has its own state and never inherits stale button state
function TxCard({ tx, dayOff, simDelta, currentUser, submissions, onAssign, collapsing }) {
    const conflict   = conflictVisible(dayOff, simDelta) && (() => {
        const sub = submissions[tx.id] || {};
        const vals = USERS.map(u => sub[u]).filter(v => v != null && v !== 'Unsure');
        return vals.length > 1 && new Set(vals).size > 1;
    })();
    const mySub      = (submissions[tx.id] || {})[currentUser] ?? null;
    const anyUnsure  = USERS.some(u => (submissions[tx.id] || {})[u] === 'Unsure');
    const isCollapsing = collapsing.has(tx.id);

    const cardClass = ['tx-card',
        conflict   ? 'conflict'    : '',
        anyUnsure  ? 'unsure-card' : '',
        isCollapsing ? 'collapsing' : '',
    ].filter(Boolean).join(' ');

    return React.createElement('div', { className: cardClass },
        React.createElement('div', { className: 'tx-top' },
            React.createElement('div', null,
                React.createElement('div', { className: 'tx-meta' },
                    conflict  && React.createElement('span', { className: 'badge badge-conflict' }, '⚠ conflict'),
                    anyUnsure && React.createElement('span', { className: 'badge badge-unsure'   }, '? unsure'),
                ),
                React.createElement('p', { className: 'tx-desc' }, tx.description)
            ),
            React.createElement('span', { className: 'tx-amount' }, '$' + tx.amount.toFixed(2))
        ),

        conflict
            // Conflict UI: no highlight on any button
            ? React.createElement('div', null,
                React.createElement('p', { className: 'conflict-note' }, 'Tap to update your pick'),
                React.createElement('div', { className: 'conflict-assign' },
                    // Show all options including Unsure for conflict resolution
                    ALL_OPTS.map(opt =>
                        React.createElement('button', {
                            key: opt,
                            className: 'conflict-tap-btn',
                            onClick: () => onAssign(tx.id, dayOff, opt)
                        }, opt)
                    )
                )
              )
            // Normal assign row: plain buttons, no active state ever
            : React.createElement('div', { className: 'assign-row' },
                React.createElement('span', { className: 'assign-label' }, 'assign'),
                USERS.map(opt =>
                    React.createElement('button', {
                        key: opt,
                        className: 'tap-btn',
                        onClick: () => onAssign(tx.id, dayOff, opt)
                    }, opt)
                ),
                React.createElement('button', {
                    className: 'tap-btn unsure-btn',
                    onClick: () => onAssign(tx.id, dayOff, 'Unsure')
                }, '?')
              )
    );
}

// ── Main App ──────────────────────────────────────────────
function CreditCardApp() {
    const [currentUser, setCurrentUser] = useState(null);
    const [submissions, setSubmissions]  = useState({});
    const [showSwitch, setShowSwitch]    = useState(false);
    const [simDelta, setSimDelta]        = useState(0);
    const [collapsing, setCollapsing]    = useState(new Set());
    const [undoStack, setUndoStack]      = useState([]);
    const doneMsg = useRef(DONE_MSGS[Math.floor(Math.random() * DONE_MSGS.length)]);

    useEffect(() => {
        const u = localStorage.getItem(USER_KEY);
        if (u && USERS.includes(u)) setCurrentUser(u);
        setSubmissions(loadSubmissions());
    }, []);

    const saveSubmissions = (subs) => {
        setSubmissions(subs);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(subs));
    };

    // Switch user: reload submissions fresh from storage so other user's picks show immediately
    const selectUser = u => {
        setCurrentUser(u);
        localStorage.setItem(USER_KEY, u);
        setSubmissions(loadSubmissions()); // fresh reload
        setCollapsing(new Set());
        setUndoStack([]);
        setShowSwitch(false);
    };

    const resetCache = () => {
        if (!confirm('Reset all data? This clears all assignments and logs you out.')) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(USER_KEY);
        setSubmissions({});
        setCollapsing(new Set());
        setUndoStack([]);
        setCurrentUser(null);
    };

    // Day offsets to consider: simDelta down to simDelta-2
    const MIN_DAY = simDelta - 2;
    const allDayOffsets = [];
    for (let d = simDelta; d >= MIN_DAY; d--) {
        if (TX_BY_DAYOFF[String(d)]) allDayOffsets.push(d);
    }

    const getSub   = txId => submissions[txId] || {};
    const myPick   = txId => getSub(txId)[currentUser] ?? null;

    const isConflict = (txId, txDayOff) => {
        if (!conflictVisible(txDayOff, simDelta)) return false;
        const sub = getSub(txId);
        const vals = USERS.map(u => sub[u]).filter(v => v != null && v !== 'Unsure');
        return vals.length > 1 && new Set(vals).size > 1;
    };

    const isUnsured = txId => USERS.some(u => getSub(txId)[u] === 'Unsure');

    // Card is visible if: user hasn't picked, OR it's a conflict, OR someone said Unsure
    const isVisible = (tx, dayOff) => {
        if (collapsing.has(tx.id)) return true; // animating out
        return isConflict(tx.id, dayOff) || isUnsured(tx.id) || myPick(tx.id) === null;
    };

    const assign = (txId, txDayOff, assignTo) => {
        const prev = myPick(txId);
        setUndoStack(s => [...s, { txId, user: currentUser, prev }]);

        const newSubs = {
            ...submissions,
            [txId]: { ...submissions[txId], [currentUser]: assignTo }
        };
        saveSubmissions(newSubs);

        // Collapse after brief delay — unless it's Unsure (stays pinned) or conflict
        if (assignTo !== 'Unsure') {
            setTimeout(() => {
                // Re-check conflict with new state
                const sub = newSubs[txId] || {};
                const vals = USERS.map(u => sub[u]).filter(v => v != null && v !== 'Unsure');
                const conflict = conflictVisible(txDayOff, simDelta) && vals.length > 1 && new Set(vals).size > 1;
                const unsured = USERS.some(u => sub[u] === 'Unsure');
                if (!conflict && !unsured) {
                    setCollapsing(c => new Set([...c, txId]));
                }
            }, 250);
        }
    };

    const undo = () => {
        if (undoStack.length === 0) return;
        const last = undoStack[undoStack.length - 1];
        setUndoStack(s => s.slice(0, -1));
        setCollapsing(c => { const n = new Set(c); n.delete(last.txId); return n; });
        const newSubs = {
            ...submissions,
            [last.txId]: { ...submissions[last.txId], [last.user]: last.prev }
        };
        saveSubmissions(newSubs);
    };

    // Tallies across all days
    const tallies = Object.fromEntries(USERS.map(u => [u, 0]));
    Object.entries(TX_BY_DAYOFF).forEach(([, txList]) => {
        txList.forEach(tx => {
            const sub = getSub(tx.id);
            const vals = USERS.map(u => sub[u]).filter(v => v != null && v !== 'Unsure');
            if (vals.length === USERS.length && new Set(vals).size === 1) {
                const to = sub[USERS[0]];
                if (to in tallies) tallies[to] += tx.amount;
            }
        });
    });

    if (!currentUser) return React.createElement(LandingPage, { onSelect: u => { setCurrentUser(u); localStorage.setItem(USER_KEY, u); setSubmissions(loadSubmissions()); } });

    // Build groups — only include groups that have visible non-collapsing cards
    const groups = allDayOffsets.map(dayOff => {
        const raw = TX_BY_DAYOFF[String(dayOff)] || [];
        const txList = raw.map(t => ({ ...t, dayOff, date: isoDate(dayOff) }));
        const visible = txList.filter(tx => isVisible(tx, dayOff));
        const activeVisible = visible.filter(tx => !collapsing.has(tx.id));
        return { dayOff, txList, visible, activeVisible };
    }).filter(g => g.activeVisible.length > 0);

    // Unsure-pinned cards across all days — float to top
    const unsurePinned = allDayOffsets.flatMap(dayOff => {
        const raw = TX_BY_DAYOFF[String(dayOff)] || [];
        return raw
            .filter(tx => isUnsured(tx.id) && !collapsing.has(tx.id))
            .map(t => ({ ...t, dayOff, date: isoDate(dayOff) }));
    });

    // Stats across all visible days
    let totalTx = 0, totalPending = 0, totalConflicts = 0;
    allDayOffsets.forEach(dayOff => {
        const txList = TX_BY_DAYOFF[String(dayOff)] || [];
        totalTx += txList.length;
        txList.forEach(tx => {
            if (isConflict(tx.id, dayOff)) totalConflicts++;
            else if (myPick(tx.id) === null) totalPending++;
        });
    });

    const anyVisible = groups.some(g => g.activeVisible.length > 0) || unsurePinned.length > 0;

    const simLabel = simDelta === 0 ? 'today'
        : simDelta > 0 ? `+${simDelta}d`
        : `${Math.abs(simDelta)}d ago`;

    const stepDay = delta => {
        setSimDelta(d => d + delta);
        setCollapsing(new Set());
    };

    return React.createElement('div', null,

        showSwitch && React.createElement(SwitchOverlay, {
            currentUser, onSelect: selectUser, onClose: () => setShowSwitch(false)
        }),

        // Dev banner
        React.createElement('div', { className: 'dev-banner' },
            React.createElement('span', { className: 'dev-label' }, '🛠 dev'),
            React.createElement('button', { className: 'day-btn', onClick: () => stepDay(-1) }, '◀ prev'),
            React.createElement('span', { className: 'day-display' }, simLabel),
            React.createElement('button', { className: 'day-btn', onClick: () => stepDay(1) }, 'next ▶'),
            React.createElement('button', { className: 'day-btn', style:{color:'#6b7280',borderColor:'rgba(107,114,128,0.2)',background:'transparent'}, onClick: () => { setSimDelta(0); setCollapsing(new Set()); } }, 'reset'),
            React.createElement('span', { className: 'dev-sep' }, '|'),
            React.createElement('button', { className: 'reset-cache-btn', onClick: resetCache }, '🗑 clear data'),
        ),

        // Tally bar
        React.createElement('div', { className: 'tally-bar' },
            USERS.flatMap((u, i) => [
                i > 0 ? React.createElement('div', { key:'sep'+i, style:{width:'1px',background:'rgba(255,255,255,0.05)'} }) : null,
                React.createElement('div', { key: u, className: 'tally-item' },
                    React.createElement('div', { className: 'tally-name' }, u),
                    React.createElement('div', { className: 'tally-amount' }, '$' + (tallies[u]||0).toFixed(2))
                )
            ]).filter(Boolean)
        ),

        React.createElement('div', { className: 'app' },

            React.createElement('div', { className: 'app-header' },
                React.createElement('h1', { className: 'app-title' }, '💳 Transactions'),
                React.createElement('div', { className: 'header-right' },
                    React.createElement('button', { className: 'undo-btn', disabled: undoStack.length === 0, onClick: undo }, '↩ undo'),
                    React.createElement('button', { className: 'user-badge', onClick: () => setShowSwitch(true) },
                        currentUser[0], ' ', currentUser, ' ↕'
                    )
                )
            ),

            React.createElement('div', { className: 'stats-grid' },
                [
                    { label: 'Total',     value: totalTx },
                    { label: 'Pending',   value: totalPending },
                    { label: 'Conflicts', value: totalConflicts },
                ].map(s => React.createElement('div', { key: s.label, className: 'stat-box' },
                    React.createElement('div', { className: 'stat-val' }, s.value),
                    React.createElement('div', { className: 'stat-label' }, s.label)
                ))
            ),

            !anyVisible
                ? React.createElement('div', { className: 'all-done' },
                    React.createElement('span', { className: 'all-done-emoji' }, doneMsg.current.emoji),
                    React.createElement('h2', { className: 'all-done-title' }, doneMsg.current.title),
                    React.createElement('p', { className: 'all-done-sub' }, doneMsg.current.sub)
                  )
                : React.createElement('div', null,

                    // ── Unsure pinned section ──
                    unsurePinned.length > 0 && React.createElement('div', { className: 'unsure-section' },
                        React.createElement('div', { className: 'unsure-header' },
                            React.createElement('span', { className: 'unsure-label' }, '📌 needs review'),
                            React.createElement('div', { className: 'unsure-line' }),
                        ),
                        unsurePinned.map(tx =>
                            React.createElement(TxCard, {
                                key: tx.id + '-unsure',
                                tx, dayOff: tx.dayOff, simDelta, currentUser,
                                submissions, onAssign: assign, collapsing
                            })
                        )
                    ),

                    // ── Day groups ──
                    groups.map(({ dayOff, visible }) => {
                        const label   = dayLabel(dayOff, simDelta);
                        const isToday = dayOff === simDelta;
                        const date    = isoDate(dayOff);

                        // Exclude unsure-pinned cards from the group (they're shown above)
                        const groupCards = visible.filter(tx => !isUnsured(tx.id));
                        if (groupCards.filter(tx => !collapsing.has(tx.id)).length === 0) return null;

                        return React.createElement('div', { key: dayOff, className: 'day-group' },
                            React.createElement('div', { className: 'day-group-header' },
                                React.createElement('span', { className: 'day-group-label' + (isToday ? ' today' : '') }, label),
                                React.createElement('div', { className: 'day-group-line' }),
                                React.createElement('span', { className: 'day-group-date' }, date)
                            ),
                            groupCards.map(tx =>
                                React.createElement(TxCard, {
                                    key: tx.id,
                                    tx, dayOff, simDelta, currentUser,
                                    submissions, onAssign: assign, collapsing
                                })
                            )
                        );
                    }).filter(Boolean)
                  )
        )
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CreditCardApp));
</script>
</body>
</html>
