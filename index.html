    <style>

        body{background:#0a0d12;color:#e8e6e1;font-family:'DM Mono',monospace;min-height:100vh;-webkit-tap-highlight-color:transparent;}

        /* Landing */

        .user-btn{display:block;width:100%;padding:1rem 1.5rem;margin-bottom:0.75rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#e8e6e1;font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;cursor:pointer;transition:all 0.2s;text-align:left;-webkit-tap-highlight-color:transparent;}

        .user-initial{display:inline-block;width:32px;height:32px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.25);border-radius:50%;text-align:center;line-height:32px;font-size:0.9rem;margin-right:0.75rem;vertical-align:middle;font-family:'DM Mono',monospace;color:#60a5fa;}
        .landing-footer{margin-top:3rem;font-size:0.6rem;color:#374151;letter-spacing:0.1em;}

        /* Dev banner */
        .dev-banner{background:rgba(234,179,8,0.06);border-bottom:1px solid rgba(234,179,8,0.15);padding:0.35rem 0.75rem;display:flex;align-items:center;justify-content:center;gap:0.45rem;flex-wrap:wrap;}
        .dev-label{font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;color:#92400e;}
        .day-display{font-size:0.64rem;color:#fbbf24;min-width:56px;text-align:center;}
        .day-btn{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);border-radius:4px;color:#d97706;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
        .reset-btn{background:transparent;border:1px solid rgba(107,114,128,0.2);border-radius:4px;color:#6b7280;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}
        .clear-btn{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:4px;color:#f87171;font-family:'DM Mono',monospace;font-size:0.64rem;padding:0.15rem 0.48rem;cursor:pointer;-webkit-tap-highlight-color:transparent;}

        /* Tally bar */

        .stat-val{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:300;color:#f1f0ec;line-height:1;}

        .header-right{display:flex;align-items:center;gap:0.45rem;}

        .tx-desc{font-size:0.75rem;color:#d1cfc9;}

        .assign-row{display:flex;gap:0.28rem;align-items:center;}

        .tap-btn.mac-btn{color:#7c6f9e;border-color:rgba(167,139,250,0.12);background:rgba(167,139,250,0.04);}
        .tap-btn.unsure-btn{color:#6b6047;border-color:rgba(245,158,11,0.1);background:rgba(245,158,11,0.03);}
        .tap-btn.flash{background:rgba(59,130,246,0.2)!important;border-color:rgba(59,130,246,0.4)!important;color:#93c5fd!important;}
        .tap-btn.tony-btn{color:#4ade80;border-color:rgba(74,222,128,0.15);background:rgba(74,222,128,0.05);}
        .tap-btn.nugs-btn{color:#f9a8d4;border-color:rgba(249,168,212,0.15);background:rgba(249,168,212,0.05);}
        .tap-btn.tony-btn.flash{background:rgba(74,222,128,0.18)!important;border-color:rgba(74,222,128,0.4)!important;color:#86efac!important;}
        .tap-btn.nugs-btn.flash{background:rgba(249,168,212,0.18)!important;border-color:rgba(249,168,212,0.4)!important;color:#fbcfe8!important;}
        .conflict-tap-btn.tony-btn{border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.06);color:#4ade80;}
        .conflict-tap-btn.nugs-btn{border-color:rgba(249,168,212,0.2);background:rgba(249,168,212,0.06);color:#f9a8d4;}
        .conflict-tap-btn.tony-btn.flash{background:rgba(74,222,128,0.2)!important;}
        .conflict-tap-btn.nugs-btn.flash{background:rgba(249,168,212,0.2)!important;}
        .tally-item.me .tally-amount{color:#e8e6e1;}
        .tap-btn.mac-btn.flash{background:rgba(167,139,250,0.2)!important;border-color:rgba(167,139,250,0.4)!important;color:#c4b5fd!important;}
        .tap-btn.unsure-btn.flash{background:rgba(245,158,11,0.15)!important;border-color:rgba(245,158,11,0.3)!important;color:#fbbf24!important;}

        /* Conflict re-assign */
        .conflict-note{font-size:0.52rem;color:#6b7280;margin-bottom:0.3rem;}
        .conflict-row{display:flex;gap:0.28rem;flex-wrap:wrap;}
        .conflict-tap-btn{flex:1;min-width:52px;padding:0.38rem 0.2rem;border-radius:5px;border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.06);color:#f87171;font-family:'DM Mono',monospace;font-size:0.62rem;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;outline:none;}
        .conflict-tap-btn.mac-btn{border-color:rgba(167,139,250,0.2);background:rgba(167,139,250,0.06);color:#c4b5fd;}
        .conflict-tap-btn.unsure-btn{border-color:rgba(245,158,11,0.15);background:rgba(245,158,11,0.05);color:#fbbf24;}
        .conflict-tap-btn.flash{opacity:0.6;}
        .my-pick-note{font-size:0.5rem;color:#6b7280;margin-bottom:0.28rem;}
        .my-pick-chip{display:inline-block;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:4px;padding:0.06rem 0.4rem;color:#60a5fa;font-size:0.52rem;}

        /* Switch overlay */
        .switch-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:100;padding:2rem;}
        .switch-card{background:#0f1318;border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:2rem;width:100%;max-width:320px;text-align:center;}
        .switch-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;margin-bottom:0.35rem;color:#f1f0ec;}
        .switch-sub{font-size:0.62rem;color:#4b5563;margin-bottom:1.5rem;}

        /* All done */
        .all-done{text-align:center;padding:3rem 1.5rem 4rem;}
        .all-done-inner{animation:fadeUp 0.6s ease forwards;}

        .all-done-title{font-family:'Fraunces',serif;font-size:2rem;font-weight:300;color:#f1f0ec;margin-bottom:0.5rem;line-height:1.2;}
        .all-done-sub{font-size:0.72rem;color:#4b5563;margin-bottom:1.5rem;}
        .all-done-badge{display:inline-block;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:#60a5fa;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:20px;padding:0.3rem 0.8rem;animation:fadeUp 0.5s ease 0.5s both;}

        /* Sync status bar */
        .sync-bar{display:flex;align-items:center;justify-content:space-between;padding:0.3rem 0.9rem;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.04);}
        .sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
        .sync-dot.connected{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.6);}
        .sync-dot.disconnected{background:#f87171;}
        .sync-dot.connecting{background:#fbbf24;animation:pulse 1s infinite;}
        .sync-status{display:flex;align-items:center;gap:0.4rem;font-size:0.52rem;color:#4b5563;letter-spacing:0.08em;}
        .sync-status.connected{color:#4ade80;}
        .sync-status.disconnected{color:#f87171;}
        .online-users{display:flex;align-items:center;gap:0.35rem;}
        .online-chip{font-size:0.5rem;padding:0.1rem 0.45rem;border-radius:10px;letter-spacing:0.05em;}
        .online-chip.active{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.2);}
        .online-chip.self{background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.2);}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop{0%{transform:scale(0.4);opacity:0}60%{transform:scale(1.3)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
    </style>
</head>
<body>
<canvas id="confetti-canvas" style="display:none;width:100%;height:100%"></canvas>
<div id="root"></div>
<script>
/* ── Firebase init ── */
// 🔧 REPLACE THIS URL with your Firebase Realtime Database URL
const FIREBASE_URL = 'https://credit-card-app-96107-default-rtdb.asia-southeast1.firebasedatabase.app';

firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();
const subsRef = db.ref('submissions');

// ── Presence: track who's currently viewing the app ──
// Uses Firebase's built-in .info/connected for reliable online detection
const presenceRef = db.ref('presence');
const connectedRef = db.ref('.info/connected');

/* ── Confetti ── */
(function(){
    const cv=document.getElementById('confetti-canvas');
    const cx=cv.getContext('2d');
    let pts=[],raf=null,on=false;
    const COLS=['#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c'];
    const rnd=(a,b)=>Math.random()*(b-a)+a;
    function spawn(n){for(let i=0;i<n;i++)pts.push({x:rnd(0.15,0.85)*cv.width,y:rnd(-60,-5),vx:rnd(-3,3),vy:rnd(3,8),rot:rnd(0,6.28),rv:rnd(-0.12,0.12),w:rnd(7,14),h:rnd(4,8),col:COLS[Math.floor(Math.random()*COLS.length)],a:1});}
    function frame(){cv.width=window.innerWidth;cv.height=window.innerHeight;cx.clearRect(0,0,cv.width,cv.height);pts=pts.filter(p=>p.a>0.02);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.rot+=p.rv;if(p.y>cv.height*0.65)p.a-=0.022;cx.save();cx.globalAlpha=p.a;cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.col;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});if(pts.length)raf=requestAnimationFrame(frame);else{cv.style.display='none';on=false;}}
    window.launchConfetti=function(){cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;pts=[];spawn(100);if(!on){on=true;raf=requestAnimationFrame(frame);}setTimeout(()=>spawn(65),350);};
})();

/* ── App ── */
const {useState,useEffect,useRef}=React;

const USERS=['Tony','Nugs'];
// Assign options in the requested order: Unsure, Macquarie, Tony, Nugs
const ASSIGN_OPTS=['Unsure','Macquarie','Tony','Nugs'];

const SK='cc_v4_subs';
const UK='cc_v4_user';
const APP_VERSION='r3.0';
const VK='cc_version';
// Force clear local state if app version changed (ensures clean slate on new deploys)
(function(){
    if(localStorage.getItem(VK)!==APP_VERSION){
        localStorage.removeItem(UK);
        localStorage.setItem(VK, APP_VERSION);
    }
})();
const AUTO_CONFIRM_MS=72*60*60*1000; // 72 hours in ms

// Transaction data by simulated day index
// Day 0 = first day loaded ("today"). Day 1 = next day's fresh batch, etc.
const TX={
    '0':[
        {id:'d0-0',amount:75.00,  desc:'VELOCITY REWARDS FEE'},
        {id:'d0-1',amount:295.00, desc:'CARD FEE'},
        {id:'d0-2',amount:32.21,  desc:'ALIEXPRESS North Sydney'},
        {id:'d0-3',amount:18.50,  desc:'UBER EATS Melbourne'},
        {id:'d0-4',amount:12.90,  desc:'MCDONALDS Sunshine'},
    ],
    '1':[
        {id:'d1-0',amount:1468.00,desc:'FOREIGN FEE AUD 8.01'},
        {id:'d1-1',amount:275.05, desc:'KICKSTARTER.COM Tsimshatsui'},
        {id:'d1-2',amount:54.40,  desc:'SPOTIFY PREMIUM'},
        {id:'d1-3',amount:11.00,  desc:'GOOGLE ONE Storage'},
    ],
    '2':[
        {id:'d2-0',amount:98.00,  desc:'GU HEALTH REWARDS Camberwell'},
        {id:'d2-1',amount:89.50,  desc:'COLES Footscray'},
        {id:'d2-2',amount:45.00,  desc:'BUNNINGS Warehouse'},
    ],
    '3':[
        {id:'d3-0',amount:210.00, desc:'ELECTRICITY BILL AGL'},
        {id:'d3-1',amount:9.99,   desc:'NETFLIX.COM'},
        {id:'d3-2',amount:65.00,  desc:'INTERNET BILL Aussie BB'},
    ],
    '4':[
        {id:'d4-0',amount:330.00, desc:'QANTAS AIRWAYS Sydney'},
        {id:'d4-1',amount:42.80,  desc:'SHELL COLES EXPRESS Footscray'},
        {id:'d4-2',amount:149.00, desc:'OFFICEWORKS Footscray'},
    ],
};

// All TX flat lookup
const ALL_TX_MAP={};
Object.values(TX).flat().forEach(t=>{ALL_TX_MAP[t.id]=t;});

function isoDate(daysFromNow){const d=new Date();d.setDate(d.getDate()+daysFromNow);return d.toISOString().slice(0,10);}

// simDelta: how many days we've advanced. 
// "today" = TX[simDelta], "yesterday" = TX[simDelta-1], etc.
// But TX keys are fixed (0,1,2...) — simDelta tells us which TX day is "today"
function getTodayKey(simDelta){return String(simDelta);}
function getLoadedKeys(simDelta){
    const keys=[];
    for(let i=simDelta;i>=0;i--){if(TX[String(i)])keys.push(String(i));}
    return keys; // [today, yesterday, ...]
}

// Is this TX day in the past relative to simDelta?
function isDayPast(txKey,simDelta){return parseInt(txKey)<simDelta;}

// Conflict visible only the day after (txKey < simDelta)
function conflictVisible(txKey,simDelta){return parseInt(txKey)<simDelta;}

// Firebase replaces localStorage for submissions
// loadSubs is no longer used — we use real-time listener instead
function loadSubs(){return {};} // kept for undo compatibility

const DONE=[
    {emoji:'🎉',title:"All done!",        sub:'Every transaction sorted. Legends.'},
    {emoji:'🏆',title:'Clean sweep!',     sub:'Nothing left to action today.'},
    {emoji:'✨',title:"That's everything!",sub:"You're both on top of it."},
    {emoji:'🚀',title:'Done and dusted!', sub:'Go enjoy the rest of your day.'},
];

function getOtherUser(u){return USERS.find(x=>x!==u);}

/* ── Auto-confirm logic ──
   Each submission stores { value, timestamp }.
   If only one user has submitted and 72h have elapsed, it's auto-confirmed.
   We store timestamps alongside values. */
function getSubValue(sub,user){return sub?.[user]?.value??null;}
function getSubTs(sub,user){return sub?.[user]?.ts??null;}

function isAutoConfirmed(sub,txId,nowMs){
    // If only one user has picked and 72h has passed, auto-confirm
    const picks=USERS.map(u=>({u,val:getSubValue(sub,u),ts:getSubTs(sub,u)})).filter(x=>x.val);
    if(picks.length===1){
        const ts=picks[0].ts;
        if(ts && (nowMs-ts)>=AUTO_CONFIRM_MS){
            return {user:picks[0].u,value:picks[0].val};
        }
    }
    return null;
}

/* ── TxCard ── */
function TxCard({tx,txKey,simDelta,currentUser,subs,onAssign,collapsing,nowMs}){
    const sub=subs[tx.id]||{};
    const past=conflictVisible(txKey,simDelta);
    const mySub=getSubValue(sub,currentUser);
    const otherUser=getOtherUser(currentUser);
    const otherSub=getSubValue(sub,otherUser);
    const autoConf=isAutoConfirmed(sub,tx.id,nowMs);

    // past = this tx's day is before simDelta (next-day reveal applies)
    const anyUnsure=past&&USERS.some(u=>getSubValue(sub,u)==='Unsure');
    const unsureMarkedBy=USERS.filter(u=>getSubValue(sub,u)==='Unsure');
    const nonUnsureVals=USERS.map(u=>getSubValue(sub,u)).filter(v=>v&&v!=='Unsure');
    // Conflict: past day, no Unsure, both users picked differently
    const isConflict=past&&!anyUnsure&&nonUnsureVals.length===USERS.length&&new Set(nonUnsureVals).size>1;
    const isCollapsing=collapsing.has(tx.id);

    const cardCls=['tx-card',isConflict?'conflict':'',isCollapsing?'collapsing':''].filter(Boolean).join(' ');

    function optClass(opt){
        if(opt==='Macquarie')return ' mac-btn';
        if(opt==='Unsure')return ' unsure-btn';
        if(opt==='Tony')return ' tony-btn';
        if(opt==='Nugs')return ' nugs-btn';
        return '';
    }
    function makeTap(opt,baseClass='tap-btn'){
        return {
            className:baseClass+optClass(opt),
            onPointerDown:e=>e.currentTarget.classList.add('flash'),
            onPointerUp:  e=>{e.currentTarget.classList.remove('flash');onAssign(tx.id,txKey,opt);},
            onPointerLeave:e=>e.currentTarget.classList.remove('flash'),
            onPointerCancel:e=>e.currentTarget.classList.remove('flash'),
        };
    }

    return React.createElement('div',{className:cardCls},
        React.createElement('div',{className:'tx-top'},
            React.createElement('div',null,
                React.createElement('div',{className:'tx-meta'},
                    isConflict&&React.createElement('span',{className:'badge badge-conflict'},'⚠ conflict'),
                    anyUnsure &&React.createElement('span',{className:'badge badge-unsure'},'? unsure'),
                    autoConf  &&React.createElement('span',{className:'badge badge-auto'},'✓ auto'),
                ),
                React.createElement('p',{className:'tx-desc'},tx.desc)
            ),
            React.createElement('span',{className:'tx-amount'},'$'+tx.amount.toFixed(2))
        ),

        // If auto-confirmed, show read-only
        autoConf&&!isConflict
            ? React.createElement('p',{className:'my-pick-note'},
                'Auto-confirmed → ',React.createElement('span',{className:'my-pick-chip'},autoConf.value))

        // Conflict or unsure: show re-assign
        : (isConflict||anyUnsure)
            ? React.createElement('div',null,
                anyUnsure
                    // Unsure: show who flagged it, and what the OTHER person has chosen
                    ? React.createElement('p',{className:'my-pick-note'},
                        unsureMarkedBy.join(' & ')+' marked unsure'+(
                            otherSub&&otherSub!=='Unsure'
                                ? ' · '+otherUser+' picked '+otherSub
                                : !otherSub ? ' · '+otherUser+' hasn\'t picked yet' : ''
                        )
                      )
                    // Conflict: show other person's pick
                    : React.createElement('p',{className:'my-pick-note'},
                        otherUser+' picked ',React.createElement('span',{className:'my-pick-chip'},otherSub||'—'),
                        mySub?' · your pick: '+mySub:' · tap to assign'
                      ),
                React.createElement('div',{className:'conflict-row'},
                    ASSIGN_OPTS.map(opt=>React.createElement('button',{key:opt,...makeTap(opt,'conflict-tap-btn')},opt))
                )
              )

        // Normal assign
        : React.createElement('div',{className:'assign-row'},
            React.createElement('span',{className:'assign-label'},'assign'),
            ASSIGN_OPTS.map(opt=>React.createElement('button',{key:opt,...makeTap(opt)},(opt==='Macquarie'?'MAC':opt)))
          )
    );
}

/* ── Main App ── */
function App(){
    const [user,   setUser]   =useState(null);
    const [subs,   setSubs]   =useState({});
    const [simDelta,setSim]   =useState(0);
    const [collapsing,setCol] = useState(new Set());
    const collapseTimers      = useRef([]);
    const [sessRes,setSessRes]   = useState(new Set());
    const [undoStack,setUndo] =useState([]);
    const [showSwitch,setSwitch]=useState(false);
    const [showMac,setShowMac]=useState(false);
    const [connected,setConnected]=useState(null); // null=connecting, true, false
    const [onlineUsers,setOnlineUsers]=useState({});

    const doneMsg=useRef(DONE[Math.floor(Math.random()*DONE.length)]);
    // For dev: simulate time passing for 72h auto-confirm
    // In production this would just be Date.now()
    const [simNow,setSimNow]=useState(Date.now());

    // Load user from localStorage (device-local preference only)
    useEffect(()=>{
        const u=localStorage.getItem(UK);
        if(u&&USERS.includes(u))setUser(u);
    },[]);

    // Firebase real-time listener — single source of truth, no optimistic writes.
    useEffect(()=>{
        const handler=subsRef.on('value', snap=>{
            setSubs(snap.val()||{});
        });
        return ()=>subsRef.off('value',handler);
    },[]);

    // Monitor Firebase connection status + test write on connect
    useEffect(()=>{
        connectedRef.on('value', snap=>{
            const isConnected=snap.val()===true;
            setConnected(isConnected);
            if(isConnected){
                // Write a harmless ping — if this shows in Firebase console, writes are working
                db.ref('_ping').set({t:Date.now(),msg:'write test ok'});
            }
        });
        return ()=>connectedRef.off('value');
    },[]);

    // Presence: register this user as online when logged in, remove on disconnect
    useEffect(()=>{
        if(!user)return;
        const myRef=presenceRef.child(user);
        // Set presence, auto-remove on disconnect
        myRef.set({online:true,ts:Date.now()});
        myRef.onDisconnect().remove();
        // Watch all presence
        const handler=presenceRef.on('value',snap=>{
            setOnlineUsers(snap.val()||{});
        });
        return ()=>{
            myRef.remove();
            presenceRef.off('value',handler);
        };
    },[user]);

    // Save a single tx submission to Firebase (merge with existing)
    const save=(txId,txData)=>{
        db.ref('submissions/'+txId).update(txData);
    };

    const login=u=>{
        setUser(u);localStorage.setItem(UK,u);
        setCol(new Set()); setSessRes(new Set()); setUndo([]); setSwitch(false);
    };

    const resetCache=()=>{
        if(!confirm('Reset all data? This clears ALL devices.'))return;
        subsRef.remove();
        localStorage.removeItem(UK);
        setSubs({}); setCol(new Set()); setUndo([]); setUser(null); setShowMac(false);
    };

    // ── All logic reads from `subs` (Firebase ground truth only) ──────────────
    // subs is set exclusively by the Firebase listener. No optimistic writes.
    // remainingFor is identical on both devices for both users.

    const getSub  = id => subs[id] || {};
    const getPick = (id, u) => getSub(id)[u]?.value ?? null;

    const isToday = txKey => parseInt(txKey) === simDelta;
    const isPast  = txKey => parseInt(txKey) < simDelta;

    const isAutoConf = id => isAutoConfirmed(getSub(id), id, simNow);

    // Unsure: any user picked 'Unsure'. Overrides conflict. Only revealed on past days.
    const anyoneUnsure    = id => USERS.some(u => getPick(id, u) === 'Unsure');
    const isUnsurePinned  = (id, txKey) => isPast(txKey) && anyoneUnsure(id);

    // Conflict: past day, no unsure, both users have picked, and their picks differ.
    // ALL pick values can conflict — Tony, Nugs, Macquarie. Any mismatch = conflict.
    const isConflict = (id, txKey) => {
        if (!isPast(txKey)) return false;
        if (anyoneUnsure(id)) return false;
        const picks = USERS.map(u => getPick(id, u)).filter(Boolean);
        return picks.length === USERS.length && new Set(picks).size > 1;
    };

    // remainingFor(u, tx, txKey):
    //
    // Core rules confirmed with user:
    //   1. Every tap closes the card — always. N tasks = N taps to clear.
    //   2. MY remaining decrements on each tap (uses sessRes for instant feedback).
    //   3. Other user's remaining = their unpicked cards + past-day conflicts/unsures.
    //   4. Conflicts are invisible same day. Only surface next day.
    //   5. Once conflict surfaces (next day), it counts as remaining for BOTH users
    //      until they each tap to re-resolve it this session.
    //
    // "Surfaced" conflict/unsure = isPast AND conflict/unsure exists in Firebase.
    // Both users need to re-tap to clear it from their remaining.
    // We track current user's taps via sessRes (local). Other user's taps tracked
    // by whether Firebase shows them having picked AFTER the conflict surfaced —
    // but since we can't timestamp the conflict surface, we use: if the other user
    // has a real pick AND the conflict still exists → they're still remaining.
    // When they re-tap, their Firebase pick updates → if still conflict, remains.
    // This means other user's remaining only drops when conflict fully resolves.
    //
    // Simpler: for other user, remaining = no pick OR Unsure OR conflict/unsure exists.
    // For current user, remaining = same but sessRes gives instant local drop.
    const remainingFor = (u, tx, txKey) => {
        if (isAutoConf(tx.id)) return false;
        const pick = getPick(tx.id, u);
        // TODAY: one tap = done
        if (isToday(txKey)) return !pick;
        // PAST DAY
        if (!pick) return true;
        if (pick === 'Unsure') return true;
        // Has a real pick — check if conflict/unsure surfaced
        const conflict = isConflict(tx.id, txKey);
        const unsure   = isUnsurePinned(tx.id, txKey);
        if (!conflict && !unsure) return false; // clean, done
        // Conflict/unsure surfaced — needs re-resolution from this user
        if (u === user) return !sessRes.has(tx.id); // instant local feedback
        return true; // other user: always remaining until Firebase shows resolved
    };

    // isVisible: card shown on screen if remaining for current user OR mid-animation
    const isVisible = (tx, txKey) =>
        collapsing.has(tx.id) || remainingFor(user, tx, txKey);

    // assign: write to Firebase, collapse card visually.
    // Count updates come from Firebase listener firing (~100-200ms later).
    const assign = (txId, txKey, opt) => {
        setUndo(s => [...s, {txId, u:user, prev:getPick(txId,user), prevSub:getSub(txId)[user]}]);
        save(txId, {[user]: {value:opt, ts:simNow}});
        if (isPast(txKey)) setSessRes(r => new Set([...r, txId]));
        const timer = setTimeout(() => setCol(c => new Set([...c, txId])), 220);
        collapseTimers.current.push(timer);
    };

    const undo=()=>{
        if(!undoStack.length)return;
        const last=undoStack[undoStack.length-1];
        setUndo(s=>s.slice(0,-1));
        setCol(c=>{const n=new Set(c);n.delete(last.txId);return n;});
        // Restore previous value in Firebase
        if(last.prevSub){
            db.ref('submissions/'+last.txId).update({[last.u]:last.prevSub});
            setSubs(cur=>({...cur,[last.txId]:{...(cur[last.txId]||{}),[last.u]:last.prevSub}}));
        } else {
            // Was null — remove this user's pick
            db.ref('submissions/'+last.txId+'/'+last.u).remove();
            setSubs(cur=>{
                const n={...cur};
                if(n[last.txId]){const t={...n[last.txId]};delete t[last.u];n[last.txId]=t;}
                return n;
            });
        }
    };

    const cancelTimers=()=>{ collapseTimers.current.forEach(clearTimeout); collapseTimers.current=[]; };
    const stepDay  = () => { cancelTimers(); setSim(d=>d+1); setCol(new Set()); setSessRes(new Set()); setSimNow(simNow+24*60*60*1000); };
    const resetDay = () => { cancelTimers(); setSim(0);       setCol(new Set()); setSessRes(new Set()); setSimNow(Date.now()); };

    // Tally: always show Tony and Nugs totals (what each assigned to themselves)
    // Macquarie: deduplicated sum of txns anyone assigned to Macquarie
    const userTallies={};
    USERS.forEach(u=>{ userTallies[u]=Object.values(ALL_TX_MAP).reduce((acc,tx)=>{
        const pick=getSubValue(getSub(tx.id),u);
        if(pick===u)acc+=tx.amount;
        return acc;
    },0); });

    const macSet=new Set();
    Object.values(ALL_TX_MAP).forEach(tx=>{
        USERS.forEach(u=>{
            if(getSubValue(getSub(tx.id),u)==='Macquarie')macSet.add(tx.id);
        });
    });
    const macTally=[...macSet].reduce((a,id)=>a+(ALL_TX_MAP[id]?.amount||0),0);

    if(!user)return React.createElement(Landing,{onSelect:login});

    const otherUser=getOtherUser(user);
    const loadedKeys=getLoadedKeys(simDelta);

    // Build groups — only show today and past days with unresolved items
    const groups=loadedKeys.map(txKey=>{
        const list=(TX[txKey]||[]);
        const visible=list.filter(tx=>isVisible(tx,txKey));
        const active=visible.filter(tx=>!collapsing.has(tx.id));
        const past=isDayPast(txKey,simDelta);
        const rel=parseInt(txKey)-simDelta; // 0=today,-1=yesterday
        const label=rel===0?'today':rel===-1?'yesterday':Math.abs(rel)+'d ago';
        return {txKey,list,visible,active,past,label,date:isoDate(rel)};
    }).filter(g=>g.active.length>0);

    let myRemaining=0,otherRemaining=0;
    loadedKeys.forEach(txKey=>{
        (TX[txKey]||[]).forEach(tx=>{
            if(remainingFor(user,tx,txKey))myRemaining++;
            if(remainingFor(otherUser,tx,txKey))otherRemaining++;
        });
    });

    const anyVisible=groups.length>0;
    const simLabel=simDelta===0?'today':'+'+simDelta+'d';
    // Dev: also allow simulating 72h for auto-confirm
    const simHours=Math.round((simNow-Date.now())/3600000);

    return React.createElement('div',null,
        showSwitch&&React.createElement(SwitchOverlay,{currentUser:user,onSelect:login,onClose:()=>setSwitch(false)}),

        // Sync status bar
        React.createElement('div',{className:'sync-bar'},
            React.createElement('div',{className:'sync-status '+(connected===null?'':'connected'===String(connected==='connecting')?'connecting':connected?'connected':'disconnected')},
                React.createElement('div',{className:'sync-dot '+(connected===null?'connecting':connected?'connected':'disconnected')}),
connected===null?'connecting…':connected?'synced r3.1':'offline'
            ),
            React.createElement('div',{className:'online-users'},
                USERS.map(u=>
                    onlineUsers[u]
                        ? React.createElement('span',{key:u,className:'online-chip '+(u===user?'self':'active')},
                            u===user?'● '+u:'● '+u)
                        : null
                ).filter(Boolean)
            )
        ),

        // Debug panel — remove before go-live
        React.createElement('div',{style:{background:'rgba(0,0,0,0.85)',borderBottom:'1px solid rgba(255,255,0,0.2)',padding:'0.5rem 0.75rem',fontSize:'0.5rem',fontFamily:'monospace',color:'#fef08a',lineHeight:1.7}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'0.3rem'}},
                React.createElement('span',null,'🐛 DEBUG'),
                React.createElement('button',{
                    style:{fontSize:'0.5rem',padding:'0.15rem 0.5rem',background:'rgba(255,255,0,0.15)',border:'1px solid rgba(255,255,0,0.3)',borderRadius:'4px',color:'#fef08a',cursor:'pointer',fontFamily:'monospace'},
                    onClick:()=>{
                        const lines=[
                            'user:'+user+' simDelta:'+simDelta+' simNowOffset:'+(simNow-Date.now())+'ms',
                            'myRemaining:'+myRemaining+' '+otherUser+'Remaining:'+otherRemaining,
                            'subsKeys:'+Object.keys(subs).join(','),
                            'RAW_SUBS:'+JSON.stringify(subs),
                            ...loadedKeys.map(txKey=>'day'+txKey+':'+
                                (TX[txKey]||[]).map(tx=>{
                                    const sub=getSub(tx.id);
                                    return tx.id+
                                        '[T:'+getSubValue(sub,'Tony')+
                                        ' Tts:'+(sub.Tony?.ts?Math.round((simNow-sub.Tony.ts)/3600000)+'h':'null')+
                                        ' N:'+getSubValue(sub,'Nugs')+
                                        ' Nts:'+(sub.Nugs?.ts?Math.round((simNow-sub.Nugs.ts)/3600000)+'h':'null')+
                                        ' auto:'+!!isAutoConf(tx.id)+
                                        ' conf:'+isConflict(tx.id,txKey)+
                                        ' uns:'+isUnsurePinned(tx.id,txKey)+
                                        ' myR:'+remainingFor(user,tx,txKey)+
                                        ' otherR:'+remainingFor(otherUser,tx,txKey)+']';
                                }).join('|')
                            )
                        ];
                        const text=lines.join('\n');
                        try{
                            const ta=document.createElement('textarea');
                            ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
                            document.body.appendChild(ta); ta.select();
                            document.execCommand('copy');
                            document.body.removeChild(ta);
                            alert('Copied!');
                        }catch(e){alert(text);}
                    }
                },'📋 copy log')
            ),
            React.createElement('div',null,'👤 '+user+' | simDelta:'+simDelta+' | simNow+'+(simNow-Date.now())+'ms'),
            React.createElement('div',null,'📊 myR:'+myRemaining+' | '+otherUser+'R:'+otherRemaining),
            React.createElement('div',null,'subs:'+Object.keys(subs).join(',')),
            ...loadedKeys.map(txKey=>
                React.createElement('div',{key:txKey,style:{borderTop:'1px solid rgba(255,255,0,0.1)',paddingTop:'0.2rem',marginTop:'0.2rem'}},
                    React.createElement('span',{style:{color:'#a3a3a3'}},'DAY '+txKey+':'),
                    ...(TX[txKey]||[]).map(tx=>{
                        const sub=getSub(tx.id);
                        const tPick=getSubValue(sub,'Tony');
                        const nPick=getSubValue(sub,'Nugs');
                        const tTs=sub.Tony?.ts;
                        const nTs=sub.Nugs?.ts;
                        const auto=isAutoConf(tx.id);
                        const conf=isConflict(tx.id,txKey);
                        const uns=isUnsurePinned(tx.id,txKey);
                        const myR=remainingFor(user,tx,txKey);
                        const otherR=remainingFor(otherUser,tx,txKey);
                        const color=auto?'#9ca3af':conf?'#f87171':uns?'#fbbf24':(!myR&&!otherR)?'#4b5563':'#fef08a';
                        return React.createElement('div',{key:tx.id,style:{paddingLeft:'0.4rem',color}},
                            tx.id+
                            ' T:'+tPick+'('+(tTs?Math.round((simNow-tTs)/3600000)+'h':'null')+')'+
                            ' N:'+nPick+'('+(nTs?Math.round((simNow-nTs)/3600000)+'h':'null')+')'+
                            ' auto:'+!!auto+' conf:'+conf+' uns:'+uns+
                            ' myR:'+myR+' otherR:'+otherR
                        );
                    })
                )
            )
        ),

                // Dev banner
        React.createElement('div',{className:'dev-banner'},
            React.createElement('span',{className:'dev-label'},'🛠 dev'),
            React.createElement('span',{className:'day-display'},simLabel+(simHours>0?' +'+simHours+'h':'')),
            React.createElement('button',{className:'day-btn',onClick:stepDay},'next day ▶'),
            React.createElement('button',{className:'day-btn',style:{fontSize:'0.6rem'},
                onClick:()=>setSimNow(n=>n+24*60*60*1000),title:'advance 24h for auto-confirm test'},'+24h'),
            React.createElement('button',{className:'reset-btn',onClick:resetDay},'reset'),
            React.createElement('span',{className:'dev-sep'},'|'),
            React.createElement('button',{className:'clear-btn',onClick:resetCache},'🗑 clear'),
        ),

        // Tally bar — always show Tony + Nugs, Macquarie toggle on right
        React.createElement('div',{className:'tally-bar'},
            React.createElement('div',{className:'tally-main'},
                ...USERS.map((u,i)=>[
                    i>0&&React.createElement('div',{key:'sep'+i,style:{width:'1px',background:'rgba(255,255,255,0.05)'}}),
                    React.createElement('div',{key:u,className:'tally-item'+(u===user?' me':'')},
                        React.createElement('div',{className:'tally-name'},u+(u===user?' (you)':'')),
                        React.createElement('div',{className:'tally-amount'},'$'+(userTallies[u]||0).toFixed(2)),
                        React.createElement('div',{className:'tally-note'},'own assignments')
                    )
                ]).flat().filter(Boolean)
            ),
            showMac&&React.createElement('div',{className:'mac-panel'},
                React.createElement('div',{className:'tally-name'},'Macquarie'),
                React.createElement('div',{className:'tally-amount mac'},'$'+macTally.toFixed(2)),
                React.createElement('div',{className:'tally-note'},'shared')
            ),
            React.createElement('button',{className:'mac-toggle',onClick:()=>setShowMac(v=>!v),title:'Toggle Macquarie'},
                showMac?'›':'‹'
            )
        ),

        React.createElement('div',{className:'app'},
            React.createElement('div',{className:'app-header'},
                React.createElement('h1',{className:'app-title'},'💳 Transactions'),
                React.createElement('div',{className:'header-right'},
                    React.createElement('button',{className:'undo-btn',disabled:!undoStack.length,onClick:undo},'↩ undo'),
                    React.createElement('button',{className:'user-badge',onClick:()=>setSwitch(true)},
                        user[0],' ',user,' ↕')
                )
            ),

            // Stats: just two boxes
            React.createElement('div',{className:'stats-grid'},
                React.createElement('div',{className:'stat-box me'},
                    React.createElement('div',{className:'stat-val'},myRemaining),
                    React.createElement('div',{className:'stat-label'},'my remaining')
                ),
                React.createElement('div',{className:'stat-box'},
                    React.createElement('div',{className:'stat-val'},otherRemaining),
                    React.createElement('div',{className:'stat-label'},otherUser+'\'s remaining')
                )
            ),

            !anyVisible
                ? React.createElement(AllDone,{msg:doneMsg.current})
                : React.createElement('div',null,
                    groups.map(({txKey,visible,past,label,date})=>
                        React.createElement('div',{key:txKey,className:'day-group'},
                            React.createElement('div',{className:'day-group-header'},
                                past&&React.createElement('span',{className:'attention-dot'}),
                                React.createElement('span',{className:'day-label-pill '+(past?'past':'today')},label),
                                React.createElement('div',{className:'day-line '+(past?'past':'')}),
                                past
                                    ? React.createElement('span',{className:'attention-tag'},'attention · '+date)
                                    : React.createElement('span',{className:'day-date'},date)
                            ),
                            visible.map(tx=>React.createElement(TxCard,{
                                key:tx.id,tx,txKey,simDelta,currentUser:user,
                                subs,onAssign:assign,collapsing,nowMs:simNow
                            }))
                        )
                    )
                  )
        )
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
